  ingredients:
  - 50 ml Gin
  - 25 ml Fresh Lemon Juice
  - 12.5 ml Sugar Syrup
  - 15 ml Crème de Mûre
  base_fname: bramble
  image_path: cocktail-images/bramble.jpeg
  hook: Bramble is a classic cocktail made with gin, lemon juice, sugar syrup, and
    blackberry liqueur. It's a refreshing and fruity drink with a hint of tartness.
  extended_method: "1. Pour all ingredients except Crème de Mûre into a cocktail shaker.\n2.
    Add ice to the cocktail shaker.\n3. Shake the cocktail shaker well for a few seconds.\n4.
    Strain the contents of the shaker into a chilled old fashioned glass filled with
    crushed ice.\n5. Pour the Crème de Mûre over the top of the drink in a circular
    motion. \n6. Your Bramble drink is now ready to be served!"
  tips: |-
    - Use fresh blackberries for muddling and garnishing. Frozen berries can be used as well, but fresh ones add more flavor.
    - Make sure to use high-quality gin to give the drink a smooth and balanced taste. Avoid using cheap gin as it can make the drink taste harsh.
    - Use a high-quality raspberry liqueur for the best flavor. Chambord is a popular choice, but any good quality raspberry liqueur will do.
    - Balance the sweetness of the raspberry liqueur with tart lemon juice. Freshly squeezed lemon juice is best, but bottled lemon juice can be used as well.
    - To make the drink extra special, use a homemade blackberry syrup. Simply simmer fresh blackberries with sugar and water to make a sweet and tangy syrup that pairs perfectly with gin and raspberry liqueur.
    - Serve the drink over crushed ice and garnish with fresh blackberries and a lemon wedge. Enjoy!
  fun_facts: |-
    1. Bramble was invented by a British bartender named Dick Bradsell in the 1980s.
    2. The cocktail features gin, lemon juice, sugar syrup, and blackberry liqueur.
    3. It is commonly garnished with fresh blackberries and a lemon wedge.
    4. The name Bramble comes from the way the berry liqueur swirls and spreads through the drink, resembling the thorny vines of a bramble bush.
    5. Bramble was inspired by the classic gin sour and was created to showcase the unique flavor of blackberry liqueur.
  alcohol_free_alternative: An alcohol free alternative to the drink Bramble is an
    iced tea concoction made with blackberries and lemon. The base is brewed black
    tea, mixed with a homemade blackberry syrup created with fresh blackberries and
    sugar. The syrup is then stirred into the iced tea, along with freshly squeezed
    lemon juice, and garnished with fresh blackberries and a slice of lemon. This
    refreshing and flavorful drink offers a similar taste profile to a Bramble cocktail,
    but without the alcohol.
  page_body: |-
    ## Building a Bramble over crushed ice

    1. Fill an Old Fashioned glass to the top with crushed ice and set it aside to chill while you mix the drink.
    2. In a shaker, combine gin, fresh lemon juice, and sugar syrup with plenty of cubed ice. Shake hard for about 10 to 12 seconds, until the tin feels very cold.
    3. Dump any meltwater from the chilled glass, then refill it tightly with fresh crushed ice so the drink stays frosty and properly diluted.
    4. Strain the shaken mixture over the crushed ice, aiming for a clean, bright base with no large shards from the shaker.
    5. Slowly pour the blackberry liqueur over the top in a loose circular motion. It should trickle through the ice and create the Bramble’s signature deep purple streaks.
    6. Top with a little more crushed ice if needed, then garnish with a lemon slice and fresh blackberries if you have them. Serve immediately with a short straw.

    ## What the Bramble tastes like

    The Bramble drinks like a more modern gin sour with a juicy berry finish. The first sip is sharp and citrus-led, then the sweetness rounds out, and the blackberry note adds richness without making it feel heavy. Crushed ice is important here: it softens the edges as the drink opens up, making each sip a little different from the one before.

    A dry, juniper-forward gin gives a classic result, while a softer contemporary gin makes it fruitier and gentler.

    ## Why the float matters

    That final pour of crème de mûre is not just for looks. Floating it over the top creates layers of flavor, so the berry character builds gradually as the drink dilutes. If you mix it in completely from the start, the drink becomes more uniform and loses some of its visual drama and progression.

    ## A modern classic with a London backstory

    The Bramble is widely credited to Dick Bradsell, who created it in London during the 1980s. It is often cited as one of the defining modern British cocktails, inspired by the idea of picking blackberries in the countryside. While small variations exist, that origin story is the most widely accepted and documented.

    ## Easy alcohol-free Bramble riff

    For a non-alcoholic version, use a zero-proof gin alternative, fresh lemon juice, and a touch of simple syrup as the base. Replace the blackberry liqueur with a rich blackberry cordial or reduced blackberry syrup, drizzled over crushed ice in the same way. You still get the tart, floral, berry-forward profile that makes the drink so appealing.
- category: New era drinks
  name: Canchanchara
  type: Cocktail
  served: 'On the rocks: poured over ice'
  standard_drinkware: Old fashioned glass
  method: Mix honey with water and lime juice and spread the mixture on the bottom
    and sides of the glass. Add cracked ice, and then the rum. End by energetically
    stirring from bottom to top.
  ingredients:
  - 6 cl rum (Cuban aguardiente)
  - 1.5 cl fresh lime juice
  - 1.5 cl raw honey
  - 5 cl water
  base_fname: canchanchara
  image_path: cocktail-images/canchanchara.jpeg
  hook: Canchanchara is a traditional Cuban cocktail made with rum, honey, and lime
    juice. It is believed to have been a popular drink among Cuban soldiers during
    the war of independence.
  extended_method: |-
    To make a Canchanchara drink, follow these steps:

    1. Mix the raw honey, fresh lime juice, and water in a small bowl until well combined.
    2. Spread the mixture on the bottom and sides of an Old fashioned glass.
    3. Fill the glass with cracked ice.
    4. Pour 6 cl of Cuban aguardiente (rum) over the ice.
    5. Use a spoon or cocktail stirrer to vigorously stir the drink from the bottom to the top.
    6. Serve the Canchanchara immediately, optionally garnished with a lime wedge. Enjoy!
  tips: "- To make the perfect Canchanchara drink, use high-quality honey and fresh
    lime juice for a balanced flavor profile. \n- Use a rum with a higher proof (40-50%)
    to stand up to the strong flavors in the drink. \n- Make sure to stir or shake
    the ingredients well to evenly distribute the honey and lime juice. \n- Garnish
    with a slice of lime and enjoy in a traditional clay cup for an authentic experience."
  fun_facts: |-
    1. Canchanchara is a traditional Cuban cocktail made with rum, honey, and lime juice.

    2. The drink is named after a village in Cuba called La Canchanchara, where it was first created during the 19th century.

    3. Legend has it that the drink was originally made by Cuban rebels who mixed the ingredients together to give them energy during the fight for independence.

    4. Canchanchara is typically served in a small clay cup or glass with ice, and garnished with a slice of lime or mint leaves.

    5. The drink has gained popularity in recent years and is often served in modern bars and restaurants as a fun and refreshing way to experience a taste of traditional Cuban culture.
  alcohol_free_alternative: One alcohol-free alternative to Canchanchara could be
    a virgin mojito. Made with lime juice, sugar, mint leaves, and soda water, this
    refreshing drink has a similar tart and sweet taste as Canchanchara, but without
    the rum. Another option could be a fruit smoothie, made with a variety of fresh
    fruits, such as pineapple, strawberry, and coconut milk, blended to create a tropical
    and flavorful thirst-quencher. Another option could be a grapefruit and honey
    spritzer, made with fresh grapefruit juice, honey, and sparkling water, which
    combines tart, sweet, and bubbly flavors in a light and refreshing beverage.
  page_body: |-
    ## Building a proper Canchánchara

    1. Add the honey to an old fashioned glass, then pour in the water and fresh lime juice. Stir until the honey loosens and begins to dissolve; if the honey is very thick, give it a little extra time so it blends smoothly.
    2. Tilt and rotate the glass slightly as you stir, letting the sweet-tart mixture coat the lower sides of the glass. This helps distribute the flavor before the spirit goes in.
    3. Fill the glass with cracked ice rather than large cubes. The smaller ice pieces chill the drink quickly and create the lightly diluted, rustic character that suits a Canchánchara.
    4. Pour the rum over the ice. A rustic, grassy aguardiente-style rum is closest to the traditional profile, though other full-flavored white or lightly aged rums can work well.
    5. Stir energetically from the bottom upward so the honey mixture lifts through the ice and fully integrates with the rum.
    6. Taste and adjust only if needed: a few drops more lime will sharpen it, while a touch more water will soften the alcohol and open the aromas.

    ## What it tastes like in the glass

    Canchánchara is bright, earthy, and refreshingly direct. The honey gives a rounded sweetness rather than a sugary one, while lime adds a crisp edge that keeps the drink lively. The rum is the center of gravity here, so expect more spirit character than in a heavily diluted sour. Served over cracked ice, it should feel cooling, slightly rustic, and very drinkable.

    ## Cuban roots and the story behind it

    This drink is widely associated with Cuba, especially the Trinidad region, and is often described as one of the island’s oldest known rum drinks. The most credible story links it to mambí fighters during Cuba’s wars of independence in the 19th century, who used rum, honey, and citrus as a practical, invigorating mixture. Exact early recipes are hard to verify, but its reputation as a historic Cuban classic is well established.

    ## Best way to serve it today

    Use a sturdy old fashioned glass and serve it very cold. Cracked ice is more than a visual choice: it creates the quick chill and gentle dilution that make the drink feel balanced. If your rum is especially bold, a slightly longer stir helps tame it. A small lime wedge is optional, but the drink does not need elaborate garnish.

    ## Zero-proof cane-and-honey version

    For a non-alcoholic take, replace the rum with a mix of sugarcane juice or a non-alcoholic white-rum alternative plus a small splash of cooled black tea for depth. Keep the lime, honey, water, and cracked ice, then stir hard. You’ll get a refreshing drink with the same sweet-citrus structure and a similar rustic feel.
