  base_fname: sex_on_the_beach
  image_path: cocktail-images/sex_on_the_beach.jpeg
  hook: Sex on the beach is a fruity cocktail made with vodka, peach schnapps, orange
    juice, and cranberry juice. It is a popular drink for summer parties and beach
    vacations.
  extended_method: |-
    1. Fill a highball glass with ice.
    2. Add 4 cl of vodka to the glass.
    3. Add 2 cl of Peach schnapps to the glass.
    4. Pour in 4 cl of orange juice.
    5. Add 4 cl of cranberry juice to the mix.
    6. Stir all the ingredients together with a bar spoon.
    7. Garnish the drink with an orange slice.
  tips: "- Use fresh and quality ingredients, such as freshly squeezed orange juice,
    cranberry juice, and a high-quality vodka. \n- Add the ingredients in the right
    order to achieve the perfect layering effect: Start by filling a highball glass
    with ice, then add the vodka, peach schnapps, orange juice, and finally, the cranberry
    juice. \n- Use a cocktail shaker to mix the vodka, peach schnapps, and orange
    juice before pouring over the ice. \n- Garnish with a slice of orange, a cherry,
    and a cocktail umbrella for that extra touch of summer vibes. \n- Don't be afraid
    to adjust the sweetness and acidity to your taste by adding more or less orange
    and cranberry juice."
  fun_facts: |-
    1. Sex on the beach was first created in 1987 at Confetti's Bar in Florida.
    2. The drink's bright orange-red hue comes from the combination of peach schnapps, vodka, and cranberry juice.
    3. Despite its suggestive name, the drink is actually named after a popular cocktail bar in Daytona Beach, Florida.
    4. Some variations of the drink may include pineapple juice, orange juice, or even a touch of Midori melon liqueur.
    5. In 2017, a group of bartenders in Australia created a new twist on the classic Sex on the beach recipe, replacing the traditional cranberry juice with Australian native fruit, the Davidson plum.
  alcohol_free_alternative: |-
    One alcohol-free alternative to Sex on the Beach could be a mocktail called “Island Oasis”. The ingredients for this drink include:

    - 2 oz of pineapple juice
    - 2 oz of orange juice
    - 2 oz of cranberry juice
    - 1 oz of lime juice
    - 1 oz of grenadine syrup
    - Soda water

    To make the Island Oasis, combine the pineapple juice, orange juice, cranberry juice, lime juice and grenadine syrup in a cocktail shaker. Shake well and strain into a tall glass filled with ice. Top up the glass with soda water and garnish with a wedge of pineapple or a slice of lime. Enjoy the fruity, refreshing taste of this mocktail without the buzz of alcohol.
  page_body: |-
    ## Building a Sex on the Beach over ice

    1. Fill a highball glass to the top with fresh ice so the drink stays cold and properly diluted from the first sip to the last.
    2. Pour in the vodka and peach schnapps first, letting the spirits settle through the ice.
    3. Add the orange juice, then the cranberry juice. Pouring the juices last helps the color develop naturally and makes it easier to balance sweetness and tartness.
    4. Give the drink a brief, gentle stir—just enough to combine everything without flattening the bright, juicy character.
    5. Taste if you are batching or making multiple servings. If it seems too sweet, a touch more cranberry can sharpen it; if too tart, a little extra orange juice softens it.
    6. Garnish with an orange slice on the rim or tucked into the glass, and serve immediately with a straw or sip straight from the glass.

    ## What it tastes like in the glass

    Sex on the Beach is fruity, easygoing, and crowd-pleasing. The peach element gives it a soft candy-like aroma, while orange brings round citrus sweetness and cranberry adds a light tart edge that keeps it from becoming cloying. It is a classic warm-weather highball: approachable, bright, and more juicy than spirit-forward.

    ## Best way to serve it well

    This drink is at its best very cold and freshly made. Use plenty of solid ice and decent-quality juice, especially the cranberry, since its tartness shapes the finish. If you want a slightly drier version, reduce the peach liqueur a little. For a brunch-friendly style, use fresh orange juice for a fuller citrus note.

    ## 1980s beach-bar fame and a fuzzy backstory

    The exact origin is a little murky, but the most widely repeated story places the drink in Florida during the 1980s, when peach schnapps and flashy, fruit-forward cocktails were booming. Whether or not one bartender can claim it outright, the drink clearly belongs to that era of resort bars, neon nightlife, and easy-sipping contemporary classics.

    ## A booze-free beachy riff

    For a non-alcoholic version, combine peach nectar or peach syrup with orange juice and cranberry juice over ice. A small squeeze of lemon helps mimic the snap that alcohol normally brings. Garnish the same way, and you still get the sunset color and juicy, peach-citrus profile without the spirits.
