  tips: "- Use high quality tequila for the best flavor. Blanco or reposado tequila
    work well in a Tequila sunrise. \n\n- Add the ingredients in the correct order:
    ice, tequila, orange juice, and then grenadine. This will create the signature
    sunrise effect in the glass. \n\n- Use fresh squeezed orange juice for the best
    flavor. Avoid using juice from concentrate or pre-bottled juice. \n\n- Shake the
    tequila and orange juice with ice in a cocktail shaker before pouring over fresh
    ice in the glass. This helps to blend the flavors together. \n\n- Use a barspoon
    to slowly pour the grenadine down the inside of the glass. This will create the
    desired sunrise effect. \n\n- Garnish the drink with a slice of orange and a cherry
    for a beautiful presentation."
  fun_facts: |-
    1. Tequila sunrise was created in the 1930s in Arizona by a bartender at the Arizona Biltmore Hotel.

    2. The drink gets its name from the way the orange juice and grenadine mixture looks when it is poured into the tequila and ice mixture. It resembles a sunrise.

    3. Mick Jagger is rumored to have been the first one to introduce tequila sunrise to the rock and roll scene.

    4. The Eagles wrote a song called "Tequila Sunrise" in 1973, which became a chart-topping hit.

    5. The International Bartenders Association has an official recipe for tequila sunrise, which includes tequila, orange juice, and grenadine. However, it is a versatile drink, which can be altered to taste with the addition of other fruit juices and flavors.
  alcohol_free_alternative: |-
    One possible alcohol-free alternative to the tequila sunrise is a Virgin Sunrise. The Virgin Sunrise is made with orange juice, grenadine syrup and ginger ale. To make a Virgin Sunrise, follow these instructions:

    Ingredients:
    - 2 oz orange juice
    - 1 oz grenadine syrup
    - 3 oz ginger ale
    - Ice
    - Orange slice and cherry for garnish

    Instructions:
    1. Fill a cocktail shaker with ice.
    2. Add orange juice and grenadine syrup, and shake well.
    3. Pour the mixture into a tall glass filled with ice.
    4. Add ginger ale and stir gently.
    5. Garnish with an orange slice and cherry.
    6. Serve and enjoy!

    The Virgin Sunrise is a refreshing and fruity drink that is perfect for those who prefer to avoid alcohol. It has a similar appearance and taste to the tequila sunrise, but without the alcohol.
  page_body: |-
    ## Building a Tequila Sunrise with the classic gradient

    1. Fill a Collins glass generously with fresh ice so the drink stays cold and the color layers remain distinct.
    2. Pour in the tequila, then add the orange juice. Stir these together briefly before adding anything sweet, so the base is bright and evenly mixed.
    3. Slowly pour the grenadine down the inside of the glass or over the back of a spoon. It should sink toward the bottom because of its density.
    4. Wait a few seconds, then give the drink one very gentle stir if you want a soft transition from red to orange. For a more dramatic look, leave it mostly untouched.
    5. Garnish with an orange slice, half-wheel, or a cherry if you like a more retro presentation.
    6. Serve immediately with no shake and no strain—the visual effect is part of the experience, and it looks best right after building.

    ## What the Tequila Sunrise tastes like

    This is an easygoing, fruit-forward mixed drink with a soft tequila backbone. Orange juice brings sweetness and acidity, while grenadine adds a candy-like pomegranate note and the signature red base. The overall profile is smooth, juicy, and approachable rather than spirit-heavy.

    If you want it less sweet, use fresh orange juice and a lighter hand when stirring. If you want it richer and more nostalgic, a slightly sweeter orange juice style works well.

    ## Getting the sunrise look and serving it well

    The key is density and patience. Grenadine belongs at the end, and the less you disturb the drink, the more striking the layered “sunrise” effect will be. Plenty of ice helps slow dilution and keeps the color separation cleaner for longer.

    A Collins glass suits the drink well because the tall shape shows off the gradient. This cocktail is best served right away, especially in warm weather or at brunch, poolside, or casual parties.

    ## A little history and a zero-proof version

    The modern Tequila Sunrise is most often linked to California in the early 1970s, especially the version made with tequila, orange juice, and grenadine. Earlier drinks with the same name existed, so the full origin is a little murky, but the contemporary recipe became famous through pop culture and rock-era bar menus.

    For a non-alcoholic take, replace the tequila with a splash of non-alcoholic agave spirit or simply use extra orange juice with a squeeze of lime. Build it the same way so you still get the classic sunrise effect.
- category: Contemporary classics
  name: Vesper
  type: Cocktail
  served: 'Straight up: chilled, without ice'
  standard_drinkware: Cocktail glass
  method: Pour all ingredients into a cocktail shaker filled with ice cubes. Shake
    and strain into a chilled cocktail glass.
  ingredients:
  - 45 ml gin
  - 15 ml vodka
  - 7.5 ml Lillet Blanc
  base_fname: vesper
  image_path: cocktail-images/vesper.jpeg
  hook: Vesper is a cocktail made with gin, vodka, and Lillet Blanc. It was famously
    ordered by James Bond in Ian Fleming's novel, Casino Royale.
  extended_method: |-
    1. Fill a cocktail shaker with ice cubes.
    2. Pour in 45 ml of gin, 15 ml of vodka, and 7.5 ml of Lillet Blanc.
    3. Shake the cocktail shaker vigorously, making sure that all ingredients blend together.
    4. Take a chilled cocktail glass.
    5. Strain the contents of the cocktail shaker into the chilled cocktail glass.
    6. Serve immediately and enjoy your Vesper cocktail.
  tips: |-
    - Use high quality gin and vodka. The Vesper is a strong drink, so it's important to use spirits that you enjoy drinking on their own.
    - Stir the drink for at least 30 seconds with ice to achieve the desired dilution and temperature. Strain into a chilled cocktail glass.
    - Use Lillet Blanc as the vermouth. This French aperitif wine adds a slightly sweet and floral flavor to the drink.
    - Garnish with a thin slice of lemon peel. Express the oils over the drink by twisting the peel before placing it in the glass.
  fun_facts: |-
    1. The Vesper is a concoction of gin, vodka and Lillet Blanc that was first introduced by Ian Fleming in his 1953 James Bond novel "Casino Royale".

    2. The cocktail was named after Vesper Lynd, the fictional character who was James Bond's love interest in "Casino Royale".

    3. In the book, James Bond gives explicit instructions to the bartender on how to make his signature drink: "Three measures of Gordon's, one of vodka, half a measure of Kina Lillet. Shake it very well until it's ice-cold, then add a large thin slice of lemon peel."

    4. The Vesper was not actually a popular drink until it was featured in the 2006 James Bond film "Casino Royale", where it was famously ordered by Daniel Craig's Bond. The exposure in the film led to a resurgence of interest in the cocktail.

    5. The original recipe for Kina Lillet was discontinued in the 1980s, which has led to some variation in the recipe for the Vesper. Some bartenders substitute the Kina Lillet with Lillet Blanc or Cocchi Americano to replicate the original flavor.
  alcohol_free_alternative: One alcohol-free alternative to the Vesper cocktail could
    be a "Vesper mocktail". This refreshing drink can be made by mixing non-alcoholic
    gin or vodka with some grapefruit juice, lemon juice, and a simple syrup. Garnish
    it with a slice of grapefruit or lemon, and you have a delicious and tasty beverage
    that is perfect for those who don't drink alcohol or who want to limit their alcohol
    intake. The mocktail version of Vesper can provide you with a fruity and tangy
    flavor that is similar to the original cocktail but without any alcohol content.
  page_body: |-
    ## Shake the Vesper until razor-cold

    1. Chill a cocktail glass first so the drink stays crisp from the first sip to the last. A few minutes in the freezer works well, or fill the glass with ice water while you mix.
    2. Add the gin, vodka, and Lillet Blanc to a shaker filled generously with fresh ice. Use plenty of cold, solid cubes to get fast chilling and proper dilution.
    3. Shake hard for about 10 to 15 seconds. The Vesper is meant to be brisk, very cold, and slightly aerated, so a confident shake suits its style better than a gentle stir.
    4. Empty the chilling ice from the glass if needed, then fine strain the drink into the chilled cocktail glass for a clear, polished look.
    5. If you like, finish with a long lemon peel expressed over the surface. The bright citrus oils lift the drink and sharpen its elegant, dry character.
    6. Serve immediately, straight up and ice-free, while the texture is still taut and the aromatics are vivid.

    ## What the Vesper tastes like

    The Vesper is lean, strong, and aromatic. Gin brings the backbone with juniper and herbal notes, vodka smooths and lightens the profile, and Lillet Blanc adds a subtle wine-like softness with faint citrus and floral edges. It drinks drier and more forcefully than many classic shaken cocktails, with a clean finish that feels cool and precise.

    ## Bond, books, and the cocktail's reputation

    The Vesper is most closely linked to Ian Fleming's 1953 novel *Casino Royale*, where James Bond orders and names it after Vesper Lynd. That literary origin is the most credible and widely accepted source of the drink's fame. Modern versions usually use Lillet Blanc; the original recipe referred to Kina Lillet, a more bitter formulation that is no longer made in the same style.

    ## Best way to serve it today

    This cocktail rewards cold glassware and exact proportions. Because it is spirit-forward and served without ice, even small changes in dilution or temperature are noticeable. If you want a slightly softer version, use a touch more aromatized wine or garnish with lemon to brighten the nose and make it feel more approachable.

    ## A zero-proof Vesper-style alternative

    For a non-alcoholic riff, combine a juniper-forward alcohol-free spirit with a clean neutral zero-proof spirit and a small measure of a bitter white aperitif alternative. Shake with ice and strain into a chilled cocktail glass, then garnish with lemon peel. The result will not fully mimic the weight of the original, but it can echo the Vesper's brisk, citrusy, botanical profile.
