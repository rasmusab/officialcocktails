  tips: |-
    - Start by chilling all ingredients, including the glasses.
    - Combine 1 bottle of chilled champagne, 1 cup of chilled vodka, 1 cup of chilled grapefruit juice, and 1/2 cup of chilled honey syrup in a pitcher.
    - Stir gently to mix.
    - Add ice cubes to the chilled glasses and pour in the mixture.
    - Garnish the glasses with a slice of grapefruit and mint leaves.
    - Enjoy your perfectly refreshing Russian spring punch!
  fun_facts: |-
    1. Russian spring punch was first created in the 19th century by a Russian physician who was trying to find a cure for the common cold.
    2. The drink typically includes vodka, lemon juice, sugar, sparkling water, and fresh strawberries, making it a refreshing and fruity drink.
    3. Some variations of the drink include adding other fruits such as raspberries or blackberries.
    4. In Russia, it is often served during the springtime as a celebratory drink for the start of warmer weather.
    5. The drink gained popularity in the United States after it was featured in Martha Stewart's magazine in the 1990s.
  alcohol_free_alternative: |-
    One alternative to the Russian spring punch that is alcohol-free is the "Berry Lemonade". Here's how to make it:

    Ingredients:

    - 1/2 cup frozen mixed berries
    - 1/2 cup freshly squeezed lemon juice
    - 2 tbsp honey or sugar
    - 2 cups water
    - Ice cubes

    Instructions:

    1. In a blender or a food processor, puree the frozen mixed berries until smooth.

    2. In a pitcher, mix together the pureed berries, freshly squeezed lemon juice, honey/sugar and water until well blended.

    3. Serve over ice and garnish with sliced fresh strawberries and lemon slices if desired.

    This refreshing alternative can be enjoyed by both adults and kids alike, and is perfect for a summer day or a get-together with friends and family.
  page_body: |-
    ## How to build a Russian Spring Punch

    1. Fill a shaker with ice, then add the vodka, blackcurrant liqueur, simple syrup, and fresh lemon juice. Fresh juice matters here: it gives the drink its sharp, bright edge.
    2. Shake hard for about 10 to 12 seconds, until the mixture is well chilled and lightly aerated. You want enough dilution to soften the sweetness without flattening the fruit.
    3. Pack a chilled highball glass with fresh ice. Strain the shaken mixture over the ice so the base stays cold and clean.
    4. Top with sparkling wine, pouring gently to preserve the bubbles. A light stir with a bar spoon is enough to combine it without knocking out the fizz.
    5. If you like, finish with a lemon slice or a few berries for a visual cue to the cassis inside. Serve immediately while the drink is lively and sparkling.

    ## What it tastes like in the glass

    Russian Spring Punch drinks like a sparkling, darker-fruited cousin of a French 75. The vodka keeps the structure clean, while cassis brings deep berry notes and a rich purple hue. Lemon cuts through the sweetness, and the sparkling wine lifts everything with a dry, crisp finish.

    It should taste refreshing rather than sugary. If it seems too sharp, a touch more syrup helps; if it feels too rich, a slightly drier sparkling wine will bring it back into balance.

    ## Best way to serve it

    This cocktail shines very cold, with plenty of ice and strong carbonation. A highball glass works well because it shows off the color and leaves room for the sparkling topper. Use solid, fresh ice to slow dilution.

    For parties, you can pre-batch the shaken base ahead of time and keep it chilled. Add ice and sparkling wine only when serving so the drink stays bright and fizzy.

    ## A little background and an easy alcohol-free riff

    Russian Spring Punch is a modern classic usually credited to London bartender Dick Bradsell, though exact early-date documentation varies. It belongs to the late-20th-century wave of cocktails that paired classic structure with bold, crowd-pleasing fruit flavors.

    For a non-alcoholic version, shake lemon juice, blackcurrant cordial, and a little simple syrup with ice, then strain over fresh ice and top with alcohol-free sparkling wine or chilled soda water. You still get the punchy berry-citrus profile and celebratory sparkle.
- category: New era drinks
  name: Southside
  type: Cocktail
  served: 'Straight up: chilled, without ice'
  standard_drinkware: Cocktail glass
  method: Pour all ingredients into a cocktail shaker, shake well with ice, double-strain
    into chilled cocktail glass
  notes: If egg white is used shake vigorously
  ingredients:
  - 60 ml London Dry gin
  - 30 ml lemon juice
  - 15 ml simple syrup
  - 5-6 mint leaves
  - few drops of egg white (Optional)
  base_fname: southside
  image_path: cocktail-images/southside.jpeg
  hook: Southside is a classic cocktail made with gin, fresh mint leaves, lime juice,
    and simple syrup. It is a refreshing and minty drink, perfect for summer sipping.
  extended_method: |-
    1. Take a cocktail shaker and fill it with ice.
    2. Add 60 ml London Dry gin to the shaker.
    3. Pour 30 ml of lemon juice in.
    4. Add 15 ml of simple syrup.
    5. Put 5-6 mint leaves into the shaker.
    6. Optionally add a few drops of egg white.
    7. Shake the mixture well for at least 10-15 seconds.
    8. Double-strain the mixture into a chilled cocktail glass.
    9. Optionally garnish the drink with a sprig of mint.
  tips: |-
    - Use fresh ingredients: The key to a perfect Southside drink is using fresh ingredients. Use fresh mint leaves, lime juice, and good quality gin.

    - Don't skimp on the mint: Mint is the star ingredient in a Southside drink, so don't be afraid to use a lot of it. Muddle several sprigs of mint in the bottom of your cocktail shaker before adding the other ingredients.

    - Balance the sweet and sour: A great Southside drink is a balance between sweet and sour. Use simple syrup or sugar to sweeten the drink and fresh lime juice for the sour component.

    - Shake, shake, shake: Make sure to shake the drink well to ensure that all the flavors are fully mixed and the drink is ice cold.

    - Don't forget the garnish: A sprig of fresh mint and a lime wedge are classic garnishes for a Southside drink. Not only do they look great, but they also add extra flavor to the drink.

    - Serve in a chilled glass: Serve the drink in a chilled glass to keep it cold and refreshing. A coupe or martini glass works well for a Southside drink.
  fun_facts: |-
    1. The Southside cocktail originated in Chicago during the Prohibition era, where it was popularized by notorious gangster Al Capone and his associates.
    2. The classic recipe for a Southside includes gin, mint, simple syrup, and fresh lime juice, but variations may include other ingredients like cucumber or grapefruit.
    3. The Southside was reportedly a favorite of American presidents Franklin D. Roosevelt and John F. Kennedy.
    4. The cocktail's name comes from the South Side neighborhood of Chicago, where it was first created and often served in local speakeasies.
    5. Some bartenders suggest shaking a Southside vigorously before straining it into a glass to create a frothy, almost creamy texture.
  alcohol_free_alternative: An alcohol-free alternative to Southside is a beverage
    called "Virgin Southside". This drink consists of fresh lime juice, simple syrup
    or honey, and mint leaves. It is a refreshing and citrusy drink that is perfect
    for those who want to enjoy the taste of Southside without the alcohol. To make
    the Virgin Southside, add fresh lime juice, simple syrup or honey, and mint leaves
    to a cocktail shaker. Fill the shaker with ice, and shake vigorously for about
    10-15 seconds. Strain the mixture into a glass filled with ice, and garnish with
    a sprig of fresh mint. Enjoy!
  page_body: |-
    ## How to shake a Southside properly

    1. Chill a cocktail glass first so the drink stays crisp and cold once poured. A Southside is best served very cold and without ice in the glass.
    2. Add the gin, fresh lemon juice, simple syrup, and mint leaves to a shaker. If using egg white, add just a few drops here as well for a softer texture and a light foam.
    3. Gently press the mint once or twice before shaking, just enough to release its oils. Avoid over-muddling, which can make the drink taste grassy or bitter.
    4. Fill the shaker well with ice and shake hard until the tin feels thoroughly frosted. If you included egg white, shake especially vigorously to build texture.
    5. Double-strain into the chilled cocktail glass through both a Hawthorne strainer and a fine mesh strainer. This keeps out mint fragments and gives the drink a clean surface.
    6. Serve immediately. A small mint leaf can work as garnish, but keep it restrained so the drink stays elegant rather than overly aromatic.

    ## What the Southside tastes like

    The Southside sits in the same refreshing family as a gin sour, but mint gives it a cooler, cleaner finish. London Dry gin brings juniper and citrus peel, lemon adds sharp brightness, and the syrup rounds it out. When egg white is included, the texture becomes silkier and slightly more plush without changing the flavor much.

    ## Best moments to serve it

    This is an excellent aperitif cocktail: light, brisk, and polished. It works especially well in warm weather, at garden parties, or anywhere a Martini might feel too severe. Because it is served straight up, dilution matters, so shake thoroughly but serve at once.

    ## Southside background and bar lore

    The exact origin is a bit uncertain. The most repeated story links the drink either to Chicago’s South Side during the Prohibition era or to East Coast private clubs such as New York’s 21 Club. The most credible takeaway is that it emerged as an early-20th-century gin-and-mint sour with strong pre-Prohibition or Prohibition-era roots.

    ## A zero-proof Southside-style version

    For a non-alcoholic take, use a juniper-forward alcohol-free spirit in place of gin. Shake it with lemon, simple syrup, and mint exactly the same way, then double-strain into a chilled glass. You keep the bright herbal snap and refreshing structure, just without the alcohol.
- category: New era drinks
  name: Spritz
  type: Wine cocktail
  served: 'On the rocks: poured over ice'
  standard_drinkware: Wine glass (white)
  method: Build all ingredients into a wine glass filled with ice. Stir gently.
  ingredients:
  - 9 cl Prosecco
  - 6 cl Select/Aperol/Campari/Cynar
  - Splash of soda water
  base_fname: spritz
  image_path: cocktail-images/spritz.jpeg
  hook: Spritz is an Italian cocktail made with prosecco, Aperol or Campari, and soda
    water. It is refreshing, light, and perfect for any occasion.
  extended_method: |-
    1. Fill a white wine glass with ice.
    2. Pour 9 cl of Prosecco into the glass.
    3. Choose between Select, Aperol, Campari or Cynar, and pour 6 cl of one of them into the glass.
    4. Add a splash of soda water.
    5. Stir gently.
    6. Serve immediately.
  tips: "- Start with Prosecco: The perfect Spritz requires a good quality Prosecco.
    Make sure to choose a dry Prosecco as it balances the sweetness of the Aperol
    or Campari. \n\n- Add Aperol or Campari: A Spritz needs either Aperol or Campari
    to give it the distinct citrus and bittersweet flavor. Add just the right amount
    according to your taste. \n\n- Add Soda Water: The final ingredient to the recipe
    is soda water or sparkling water. Add a splash or two to create the perfect balance
    of fizz and refreshing taste. \n\n- Ice and a slice of orange: Top off the drink
    with some ice and a slice of orange for a beautiful and delicious presentation.
    Enjoy your perfect Spritz!"
  fun_facts: |-
    1. **Originated in Italy:** Originally created in northeastern Italy, the Spritz has become a beloved cocktail all around the world.

    2. **Aperol is the most popular liqueur to use:** Aperol is the most used liqueur for a Spritz, but the drink can be made with other liqueurs such as Campari or Cynar.

    3. **The name comes from the German Word Spritzeń:** Spritz means “splash” or “spray” in German.

    4. **It's usually enjoyed as an aperitif:** The drink is a popular aperitif in Italy and is perfect for sipping before a meal.

    5. **Variations exist:** Variations of the drink can be made by adding different flavors such as cucumber, lemon, or strawberry to give the drink a unique flavor.
  alcohol_free_alternative: One popular alcohol-free alternative to Spritz is the
    "Mocktail Spritz." This refreshing beverage is made with sparkling water, muddled
    fruit (such as raspberries, strawberries or citrus), and mixers like simple syrup
    or elderflower syrup. It can be served in a wine glass or a lowball glass over
    ice with a slice of fruit for garnish. Another alternative is a Blueberry Lemonade
    Spritz made with blueberries, lemon juice, simple syrup, and soda water. The mixture
    is then poured over ice and garnished with a lemon slice and a sprig of fresh
    mint.
  page_body: |-
    ## Building a classic Spritz over ice

    1. Fill a chilled white wine glass generously with fresh ice. Plenty of ice is important here: it keeps the drink brisk and slows dilution so the bubbles stay lively.
    2. Pour in the sparkling wine first, aiming down the inside of the glass to preserve carbonation. A dry, bright Prosecco is the usual choice and gives the drink its light, orchard-fruit backbone.
    3. Add your bitter aperitivo next. Select gives a more traditional Venetian feel, Aperol makes it softer and orange-forward, Campari pushes it more bitter and vivid, and Cynar adds a darker herbal note.
    4. Top with a small splash of soda water rather than a heavy pour. The goal is lift and freshness, not to wash out the balance between wine and bitters.
    5. Stir gently once or twice with a bar spoon. You want the ingredients combined without knocking too much fizz out of the drink.
    6. Serve immediately while cold and sparkling. If you like, a slice of orange or a green olive can reinforce the style of aperitivo you chose.

    ## What a Spritz tastes like

    A Spritz is all about contrast: bubbly, lightly sweet, distinctly bitter, and very refreshing. The sparkling wine keeps it crisp, while the aperitivo brings citrus peel, herbs, and a softly bitter finish. With Aperol it reads easygoing and sunny; with Campari it becomes sharper and more adult; with Select it lands somewhere in between, with a classic Venetian aperitif character.

    ## Venetian roots and modern fame

    The Spritz is most closely associated with Venice and the wider Veneto region. Its deeper origin is a little fuzzy, but the most credible story traces the name to the German *spritzen*, referring to adding a splash of water to local wine during the Habsburg era. Over time, sparkling wine and Italian bitter aperitivi turned that simple habit into the modern cocktail now seen everywhere from canal-side bars to summer terraces worldwide.

    ## Best way to serve it

    This drink works best as a pre-dinner aperitif alongside salty snacks, olives, crisps, or light seafood. Use lots of ice, serve it very cold, and don’t over-stir. If making one for someone new to bitter drinks, choose Aperol or use a slightly smaller measure of the bitter component at first.

    ## A no-alcohol Spritz-style alternative

    For a zero-proof version, build the drink with alcohol-free sparkling wine, a non-alcoholic Italian-style bitter aperitif, and soda over ice. Keep the same structure and garnish with orange. You’ll get the same bubbly, bittersweet aperitivo vibe without the alcohol.
- category: New era drinks
  name: Suffering bastard
  type: Mixed drink
  served: 'On the rocks: poured over ice'
  standard_drinkware: Collins
  method: Shake everything but ginger beer with ice, pour unstrained into glass, top
    with ginger beer.
  ingredients:
  - 30 ml gin
  - 30 ml brandy
  - 15 ml lime juice
  - 2 dashes Angostura bitters
  - ginger beer to top up
  base_fname: suffering_bastard
  image_path: cocktail-images/suffering_bastard.jpeg
  hook: The Suffering Bastard is a popular cocktail consisting of bourbon, gin, lime
    juice, and ginger beer. It was first created during World War II in Cairo, Egypt.
  extended_method: |-
    1. Combine 30 ml gin, 30 ml brandy, 15 ml lime juice, and 2 dashes of Angostura bitters in a shaker.
    2. Add ice to the shaker.
    3. Shake the ingredients vigorously for several seconds.
    4. Pour the contents of the shaker unstrained into a Collins glass.
    5. Top up the glass with ginger beer.
    6. Garnish the drink with a lime wheel or wedge (optional).
    7. Serve and enjoy.
  tips: |-
    - Use equal parts gin and brandy for the base of the drink.
    - Add lime juice, honey syrup, and Angostura bitters to balance out the flavors.
    - Serve in a tall glass with ice and top with ginger beer for a refreshing kick.
    - Garnish with a lime wedge and a sprig of mint for a beautiful finishing touch.
  fun_facts: |-
    1. Suffering Bastard was first created by a bartender named Joe Scialom in Cairo, Egypt during World War II.
    2. The drink was originally concocted as a hangover cure for British officers stationed in North Africa.
    3. Suffering Bastard is made with equal parts bourbon and gin, as well as lime juice, ginger beer, and Angostura bitters.
    4. The drink's name is said to have been inspired by the hangovers suffered by its original drinkers.
    5. Suffering Bastard became popular in the 1940s and 1950s as a tiki drink, and was frequently served in tropical-themed bars and restaurants.
  alcohol_free_alternative: One alcohol-free alternative to Suffering Bastard could
    be to use ginger ale, lime juice, pineapple juice and a dash of bitters. Ginger
    ale can provide the perfect balance of flavor by bringing fizziness and sweetness.
    Lime juice adds a tartness which works well with pineapple juice which provides
    some sweetness. Bitters add a bit of complexity and depth to the drink. The resulting
    non-alcoholic version of the Suffering Bastard is refreshing, fruity and spicy,
    and could be garnished with fresh mint leaves or a slice of lime to complete the
    inviting look.
  page_body: |-
    ## Building a proper Suffering Bastard

    1. Fill a Collins glass about three-quarters full with fresh ice so the drink stays long, cold, and lively.
    2. In a shaker, combine the gin, brandy, lime juice, and Angostura bitters with ice. Shake hard for about 10 to 12 seconds to chill thoroughly and wake up the citrus and spice.
    3. Pour the entire shaker contents into the prepared glass without straining. The small ice chips help give the drink its brisk, frosty character.
    4. Top with ginger beer, adding enough to lengthen the drink while keeping the spirits noticeable rather than buried.
    5. Give it one gentle stir from the bottom up so the ginger beer integrates without losing too much fizz.
    6. Garnish with a lime wedge, lime wheel, or a sprig of mint if you want a brighter nose before serving.

    ## What it tastes like in the Collins glass

    The Suffering Bastard lands somewhere between a buck, a highball, and a medicinal refresher. Gin brings botanical lift, brandy adds warmth and roundness, and lime keeps the middle sharp. The bitters deepen the drink with clove and spice, while ginger beer provides the snap that makes it feel especially thirst-quenching over ice. It should taste zesty, spicy, and brisk rather than sweet.

    ## How to serve it at its best

    Use a punchy, spicy ginger beer if you want the drink to feel drier and more assertive. A milder ginger beer makes it softer and easier going, but can flatten its personality. Because it is served on the rocks, fresh ice matters: old or wet ice will dilute it fast. This works particularly well in hot weather or as a palate-resetting early-evening drink.

    ## Cairo roots and the story behind the name

    The most widely repeated origin story places the Suffering Bastard in Cairo during World War II, where bartender Joe Scialom is said to have created it at Shepheard’s Hotel. It was reportedly intended as a reviver for tired, overindulged soldiers. Exact details vary depending on the source, but the wartime Cairo connection is the most credible version and has become central to the drink’s legend.

    ## A booze-free bastard

    For a non-alcoholic version, use juniper-forward zero-proof spirit and a brandy-style alcohol-free alternative, then build with fresh lime, a couple dashes of aromatic bitters if acceptable, and spicy ginger beer. If fully alcohol-free bitters are preferred, skip them and add a tiny pinch of allspice or clove syrup for similar warmth.
- category: New era drinks
  name: Tipperary
  type: Cocktail
  served: 'Straight up: chilled, without ice'
  standard_drinkware: Cocktail glass
  method: Pour all ingredients into mixing glass with ice cubes. Stir well. Strain
    into chilled cocktail glass. Garnish with a slice of orange.
  ingredients:
  - 5 cl Irish whiskey
  - 2.5 cl sweet red vermouth
  - 1.5 cl green Chartreuse
  - 2 dashes Angostura bitters
  base_fname: tipperary
  image_path: cocktail-images/tipperary.jpeg
  hook: Tipperary is a classic cocktail made with Irish whiskey, sweet vermouth, and
    green chartreuse. It's a delicious and complex drink with a herbal and slightly
    spicy taste.
  extended_method: |-
    1. Fill a mixing glass with ice cubes.
    2. Pour 5 cl of Irish whiskey into the mixing glass.
    3. Add 2.5 cl of sweet red vermouth to the mixing glass.
    4. Add 1.5 cl of green Chartreuse to the mixing glass.
    5. Add 2 dashes of Angostura bitters to the mixing glass.
    6. Stir the mixture well using a bar spoon.
    7. Strain the mixture into a chilled cocktail glass.
    8. Garnish with a slice of orange.
  tips: |-
    - The glassware: Use a rocks glass or a tumbler, add 1-2 large ice cubes or crushed ice.
    - The ingredients: Combine equal parts of Irish whiskey, Chartreuse, and sweet vermouth. Stir gently to combine.
    - The garnish: Cut a small piece of orange peel, express the oils over the drink, and rub the rim of the glass with it. Use it as a garnish.
    - The temperature: Serve it chilled but not cold. Let it rest for a minute before you take a sip.
    - The variations: You can adjust the recipe to your taste by adding more or less whiskey, or switching the sweet vermouth for another type of vermouth or aperitif.
  fun_facts: |-
    1. Tipperary is a classic cocktail made with Irish whiskey, sweet vermouth and green Chartreuse.
    2. The drink was named after a town in County Tipperary, Ireland.
    3. The Tipperary was featured in the 2011 cocktail book, "PDT Cocktail Book: The Complete Bartender's Guide from the Celebrated Speakeasy."
    4. The drink is also known as the "Green Beast" due to its green color and the high alcohol content of Chartreuse.
    5. The Tipperary has been described as a complex and sophisticated drink with a bold and herbaceous flavor profile.
  alcohol_free_alternative: One alcohol-free alternative to the drink Tipperary is
    to create a mocktail version using similar flavors. This mocktail can contain
    fresh lemon juice, cane sugar or molasses, aromatic bitters, and a splash of traditional
    Italian soda like San Pellegrino Chinotto. To make the drink, simply shake the
    ingredients with ice and strain into a glass filled with fresh ice. You can also
    add a slice of fresh lemon or a sprig of rosemary for an extra aesthetic touch.
    This drink will be delicious and refreshing, without the effects of alcohol.
  page_body: |-
    ## How to mix a Tipperary properly

    1. Chill a cocktail glass first so the drink stays crisp and silky after straining. A few minutes in the freezer works well, or fill the glass with ice water while you prepare the mix.
    2. Add Irish whiskey, sweet vermouth, green Chartreuse, and two dashes of Angostura bitters to a mixing glass.
    3. Fill the mixing glass generously with fresh ice. Large, solid cubes are best because they chill the drink thoroughly without watering it down too fast.
    4. Stir steadily for about 20 to 30 seconds. The goal is a smooth, cold, properly diluted cocktail with a glossy texture rather than a shaken, airy one.
    5. Empty the chilling ice or water from your cocktail glass.
    6. Strain the drink into the chilled glass, keeping out any ice shards for a clean presentation.
    7. Finish with a slice of orange. If you want a slightly brighter nose, give the orange peel a gentle twist over the surface before placing it on or beside the drink.

    ## What the Tipperary tastes like

    The Tipperary sits in the same spirit-forward family as the Manhattan, but it has a distinctly herbal edge. Irish whiskey brings a lighter, often silkier grain character than rye, while green Chartreuse adds bold alpine sweetness, minty spice, and layers of botanicals. Sweet vermouth rounds it out with dark fruit and richness, and the bitters tighten the finish.

    Expect a drink that is warming, aromatic, and complex, with a balance of honeyed whiskey notes, herbal intensity, and gentle bitterness.

    ## Best moment to serve it

    This cocktail shines before dinner or as a slow sipper late in the evening. Serve it very cold and straight up in a cocktail glass to keep the texture elegant. If it tastes too sweet, stir a touch longer next time for slightly more dilution. If the Chartreuse feels too dominant, a whiskey with a fuller pot still character can bring better balance.

    ## A little background

    The Tipperary is generally considered an early 20th-century cocktail, though exact origin details are not perfectly settled. It is often linked to the era of the song *It’s a Long Way to Tipperary*, which became famous during World War I. The most credible context places the drink among classic aromatic whiskey cocktails that evolved as bartenders experimented with European liqueurs and vermouths.

    ## Non-alcoholic nod to the original

    For a spirit-free version, use a non-alcoholic whiskey alternative, a dealcoholized sweet vermouth-style aperitif, a small measure of herbal alpine syrup, and a couple dashes of non-alcoholic bitters. Stir over ice and strain as usual. It will not fully match the depth of Chartreuse, but you can still capture the drink’s bittersweet, botanical character.
- category: New era drinks
  name: Tommy's margarita
  type: Mixed drink
  served: 'On the rocks: poured over ice'
  standard_drinkware: Rocks glass
  method: Pour all ingredients into a cocktail shaker, shake well with ice, strain
    into a chilled rocks glass filled with ice.
  ingredients:
  - 60 ml Tequila agave 100% reposado
  - 30 ml Fresh lime juice (Persiano)
  - 30 ml Agave syrup (1/2 water + 1/2 agave nectar)
  base_fname: tommy_s_margarita
  image_path: cocktail-images/tommy_s_margarita.jpeg
  hook: Tommy's margarita is a classic cocktail made with tequila, lime juice, and
    agave nectar. It is known for its balanced sweetness and tartness, making it a
    popular choice among margarita lovers.
  extended_method: |-
    1. Combine 60 ml of Tequila agave 100% reposado, 30 ml of Fresh lime juice (Persiano), and 30 ml of Agave syrup (1/2 water + 1/2 agave nectar) in a cocktail shaker.
    2. Add ice to the cocktail shaker.
    3. Shake the cocktail shaker well.
    4. Strain the mixture into a chilled rocks glass.
    5. Fill the rocks glass with ice.
    6. Garnish with a lime wedge, if desired.
    7. Serve and enjoy!
  tips: |-
    - Use high-quality, 100% agave tequila for the best flavor.
    - Freshly squeezed lime juice is crucial for a tart and refreshing taste. Avoid using bottled lime juice.
    - Use agave nectar instead of simple syrup for a smoother flavor.
    - Shake the margarita with ice until well chilled, then strain into a salt-rimmed glass for the perfect balance of sweetness and saltiness.
    - Feel free to customize with different types of tequila, such as reposado or añejo, for slightly different flavor profiles.
  fun_facts: |-
    1. Tommy's margarita was created in the 1990s by Julio Bermejo at his family's restaurant, Tommy's Mexican Restaurant, in San Francisco.
    2. The recipe for Tommy's margarita only includes three ingredients: 100% agave tequila, lime juice, and agave nectar.
    3. Unlike traditional margaritas made with triple sec or another orange liqueur, Tommy's margarita allows the flavor of the tequila to shine through.
    4. Tommy's margarita has become so popular that it spurred a movement to create "The Tommy's Margarita Standard," a set of guidelines for making the perfect Tommy's margarita.
    5. Tommy's margarita is often referred to as a "skinny margarita" because the use of agave nectar instead of simple syrup reduces the calorie count.
  alcohol_free_alternative: One alcohol-free alternative to Tommy's Margarita is the
    Virgin Margarita. The ingredients are lime juice, orange juice, agave syrup, and
    soda water. To create it, combine 1 oz lime juice, 1 oz orange juice, and 1 oz
    agave syrup in a cocktail shaker with ice, and shake well. Strain the mixture
    over ice in a glass, and then top with soda water. Garnish the drink with a lime
    wedge and enjoy!
  page_body: |-
    ## Building a Tommy’s Margarita over ice

    1. Chill a rocks glass while you prepare the drink, then fill it with fresh ice so the final pour stays crisp and cold.
    2. Add reposado tequila, freshly squeezed Persian lime juice, and agave syrup to a shaker tin. Using fresh juice matters here: the drink is simple, so any flat or bottled citrus will stand out.
    3. Fill the shaker generously with ice and shake hard for about 10 to 15 seconds. You want the mix properly chilled and slightly aerated, with enough dilution to soften the lime’s sharp edge.
    4. Discard the ice from the chilling step if it has melted too much, then refill the glass with solid cubes. Fresh ice helps keep the texture bright rather than watery.
    5. Strain the cocktail into the prepared rocks glass over ice. A fine strain is optional, but it can remove tiny shards and pulp for a cleaner look.
    6. Taste mentally before garnishing: Tommy’s Margarita is usually presented very simply, often without a salted rim, so balance in the shaker is the main event.
    7. If needed, make a tiny adjustment next round rather than in the glass: a touch more agave for roundness, or a little more lime for extra snap.

    ## What makes Tommy’s different from a classic Margarita

    This version swaps orange liqueur for agave syrup, giving the drink a more direct agave character and a softer, earthier sweetness. The result is lean, vivid, and focused on tequila rather than citrus-and-orange complexity. Reposado adds gentle oak, spice, and a mellow backbone that works especially well on the rocks.

    ## Tommy’s Margarita: origin and bar lore

    Tommy’s Margarita is widely credited to Julio Bermejo of Tommy’s Mexican Restaurant in San Francisco, developed in the late 1980s or early 1990s. That origin is well accepted in modern cocktail culture, though exact first-date details vary by source. The drink became hugely influential because it helped push bartenders and drinkers toward better tequila and a deeper appreciation of agave spirits.

    ## Best ways to serve it, plus a booze-free take

    Serve it very cold, with good dense ice and no fussy garnish. It pairs especially well with salty snacks, grilled food, and bright salsas.

    For a non-alcoholic riff, use a quality non-alcoholic tequila alternative, fresh lime juice, and the same agave syrup. Shake and strain over ice as usual. Add a tiny pinch of salt if you want a bit more structure and a closer Margarita-like finish.
- category: New era drinks
  name: Trinidad sour
  type: Cocktail
  served: 'Straight up: chilled, without ice'
  standard_drinkware: Cocktail glass
  method: Pour all ingredients into a cocktail shaker, shake well with ice, strain
    into chilled cocktail glass.
  ingredients:
  - 4.5 cl Angostura bitters
  - 3 cl orgeat syrup
  - 2.25 cl fresh lemon juice
  - 1.5 cl rye whiskey
  base_fname: trinidad_sour
  image_path: cocktail-images/trinidad_sour.jpeg
  hook: Trinidad sour is a strong and tangy cocktail made with rye whiskey, orgeat
    syrup, lemon juice, and Angostura bitters. It is a popular drink in Trinidad and
    Tobago and has gained popularity in other parts of the world as well.
  extended_method: |-
    1. Add 4.5 cl of Angostura bitters to a cocktail shaker.
    2. Measure and pour 3 cl of orgeat syrup into the shaker.
    3. Squeeze 2.25 cl of fresh lemon juice and add it to the shaker.
    4. Add 1.5 cl of rye whiskey to the shaker.
    5. Fill the shaker with ice cubes.
    6. Close the shaker and shake well for about 10-15 seconds.
    7. Strain the mixture into a chilled cocktail glass.
    8. Optionally, garnish the cocktail with a lemon twist or a cherry on top.
    9. Serve and enjoy responsibly.
  tips: "- Use high-quality Angostura bitters for the best flavor. \n- Use freshly
    squeezed lemon juice instead of bottled juice for a fresher taste. \n- Adjust
    the sweetness level to your preference by adding more or less orgeat syrup. \n-
    Shake the ingredients in a cocktail shaker with ice for at least 10 seconds for
    a well-mixed and frothy drink. \n- Garnish with a dash of Angostura bitters on
    top for a final pop of flavor and visual appeal."
  fun_facts: |-
    1. The Trinidad sour was invented by bartender Giuseppe Gonzalez in New York City.
    2. The drink's signature ingredient is Angostura bitters, which is produced in Trinidad and Tobago.
    3. Despite its name, the Trinidad sour is not a traditionally sweet cocktail, as it also includes ingredients like orgeat syrup and lemon juice for balance.
    4. Many bartenders have put their own spin on the Trinidad sour recipe, including adding unexpected ingredients like sherry or IPA beer.
    5. The intense red color of the Trinidad sour comes from the Angostura bitters, which is typically used only in small amounts as a garnish.
  alcohol_free_alternative: One alcohol-free alternative to Trinidad Sour is the "Virgin
    Trinidad Sour". This drink can be made by substituting the rye whiskey in the
    original recipe with a non-alcoholic alternative such as Seedlip Spice 94 or Lyre's
    American Malt. Other ingredients such as orgeat, lemon juice, and Angostura bitters
    can be used in the same proportions as the original recipe to maintain the flavor
    and balance of the drink. For a sweeter version, one can add a splash of pineapple
    juice or honey syrup to achieve a similar taste. Garnish with a lemon wedge and
    a cherry for a tropical twist. The Virgin Trinidad Sour offers all the flavor
    and complexity of the original, without the alcohol.
  page_body: |-
    ## Shaking a Trinidad Sour the right way

    1. Chill a cocktail glass first so the drink stays brisk and focused once poured. A few minutes in the freezer works well, or fill the glass with ice water while you mix.
    2. Add the aromatic bitters, almond syrup, freshly squeezed lemon, and rye to a shaker. Because this drink leans heavily on bitters, accurate measuring matters more than usual.
    3. Fill the shaker generously with cold ice. Plenty of ice helps tame dilution and gives the drink the bright, silky texture that makes the recipe work.
    4. Shake hard for about 10 to 15 seconds. You want the citrus fully integrated and the syrup lifted into the drink, not sitting heavy underneath.
    5. Empty the chilling ice from the glass if needed, then fine strain into the cold cocktail glass for a smooth, polished serve.
    6. Serve immediately, straight up and without garnish if you want to keep it classic. If you do add something, a thin lemon twist can echo the citrus without changing the profile too much.

    ## Why this odd build works

    The Trinidad Sour is famous for flipping cocktail logic on its head: bitters take the lead while the whiskey acts almost like a supporting seasoning. The result is not as harsh as it sounds. It lands rich, tart, spicy, and nutty, with baking spice from the bitters, rounded sweetness from orgeat, and sharp lift from lemon. The rye adds a dry backbone that keeps everything from becoming too plush.

    ## A modern classic with a cult following

    This drink is generally credited to bartender Giuseppe Gonzalez in the early 2000s in New York. Exact retellings vary a little, but that origin is the most widely accepted. It became a modern classic because it proved a “too much bitters” build could still be balanced, elegant, and surprisingly drinkable.

    ## Best moment to serve it

    This is a strong conversation-starter of a cocktail, ideal for adventurous drinkers and great before dinner. Keep it very cold and serve it in a small stemmed glass, since even a slight temperature rise makes the sweetness feel bigger. If someone enjoys amari, sours, or spice-forward whiskey drinks, this is a smart recommendation.

    ## A zero-proof inspired version

    For a non-alcoholic riff, use a 0% aromatic bitters alternative or a strongly spiced non-alcoholic aperitif, plus almond syrup and lemon as usual. Replace the rye with a small measure of alcohol-free whiskey alternative or even cooled black tea for dryness. It will not taste identical, but it can still deliver the same tart, spiced, almond-citrus shape.
- category: New era drinks
  name: Ve.n.to
  type: Cocktail
  served: 'On the rocks: poured over ice'
  standard_drinkware: tumbler
  method: Pour all ingredients into the shaker. Shake vigorously with ice. Strain
