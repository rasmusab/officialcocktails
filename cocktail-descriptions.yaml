  extended_method: |-
    1. Add 4 cl gin (Old Tom) into a shaker with ice cubes.
    2. Pour in 1 cl Maraschino and 1 cl fresh lemon juice into the shaker.
    3. Add 2 dashes of orange bitters into the shaker.
