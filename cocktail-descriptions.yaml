  ingredients:
  - 50 ml vodka
  - 30 ml Kahlúa
  - 10 ml sugar syrup
  - 1 strong espresso
  base_fname: espresso_martini
  image_path: cocktail-images/espresso_martini.jpeg
  hook: Espresso martini is a cocktail that combines the bitter taste of espresso
    with the sweetness of vodka and liqueur. It's a popular after-dinner drink that
    provides a caffeine and alcohol boost.
  extended_method: |-
    1. Pour 50 ml of vodka into a cocktail shaker.
    2. Add 30 ml of Kahlúa into the shaker.
    3. Measure out 10 ml of sugar syrup and pour it into the shaker.
    4. Prepare one strong shot of espresso and add it to the shaker.
    5. Add ice to the shaker and shake well.
    6. Take a chilled cocktail glass and strain the contents of the shaker into it.
    7. Garnish with coffee beans (optional).
    8. Serve and enjoy!
  tips: "- The key to a perfect Espresso martini is using fresh espresso. Make sure
    to pull a shot of espresso right before making the drink. \n- Use high-quality
    vodka and a coffee liqueur, such as Kahlúa. \n- Shake the ingredients vigorously
    with ice to create a frothy top. \n- Garnish with three coffee beans for good
    luck and an extra touch of class. \n- Serve immediately in a chilled glass to
    prevent dilution."
  fun_facts: |-
    1. The Espresso Martini was invented by British bartender Dick Bradsell in the 1980s, who wanted to create a cocktail that would wake up tired customers.
    2. It was originally called the "Vodka Espresso" until a customer nicknamed it the Espresso Martini.
    3. The original recipe calls for vodka, Kahlua, a shot of espresso, and sugar syrup, but many variations exist with different liqueurs or flavored syrups.
    4. The espresso in the drink not only adds flavor but also gives the cocktail a caffeine boost, making it a popular choice for after-dinner drinks or late-night outings.
    5. There is an annual Espresso Martini Festival that takes place in London, where bartenders showcase their unique takes on the classic cocktail.
  alcohol_free_alternative: "One alcohol-free alternative to the drink Espresso martini
    is a mocktail called the \"Espresso Kiss.\" This drink is made with freshly brewed
    espresso, chocolate syrup, and cream, which is then shaken with ice and strained
    into a martini glass. \n\nTo make an Espresso Kiss, you will need: \n\n- 1 shot
    of freshly brewed espresso \n- 1/2 oz of chocolate syrup \n- 3 oz of cream \n-
    Ice \n- Martini glass \n\nInstructions: \n\n1. Brew one shot of espresso and let
    it cool slightly. \n\n2. Add the cooled espresso, chocolate syrup, and cream to
    a cocktail shaker. \n\n3. Fill the shaker with ice and shake vigorously for about
    10-15 seconds. \n\n4. Strain the mixture into a chilled martini glass. \n\n5.
    Serve and enjoy!"
  page_body: |-
    ## Shake the espresso martini for a thick, velvety crema

    1. Chill a cocktail glass first so the drink stays cold and the foam holds its texture longer.
    2. Pull a fresh, strong espresso and let it cool briefly for a minute or two; very hot coffee can melt the ice too fast and thin the drink.
    3. Add the vodka, coffee liqueur, sugar syrup, and espresso to a shaker filled generously with ice.
    4. Shake hard for 15 to 20 seconds. This isn’t just for chilling: the vigorous shake creates the signature frothy top that makes an espresso martini look finished.
    5. Fine strain into the chilled glass to keep out small ice shards and give the surface a smooth, polished crema.
    6. If you like, wait a few seconds before serving so the foam settles evenly, then garnish traditionally with three coffee beans.

    ## What the drink tastes like in the glass

    An espresso martini is rich, roasty, lightly sweet, and brisk rather than creamy. The coffee brings bitterness and deep aroma, while the liqueur rounds it out with sweetness and a smooth, almost chocolatey edge. Vodka keeps the texture clean and lets the espresso stay center stage. Served straight up, it should feel cold, sleek, and lively, with a lingering coffee finish.

    ## Getting the balance right at home

    Fresh espresso makes the biggest difference. If the drink tastes flat, the coffee is usually the reason. If it seems too sharp or bitter, add a touch more syrup; if it feels too sweet, reduce the syrup slightly or use a more intense espresso shot. A proper hard shake is essential, because the drink’s visual appeal depends on that creamy foam cap almost as much as its flavor.

    ## London origins and a famous nightclub story

    The most widely accepted story is that the espresso martini was created in London in the 1980s by bartender Dick Bradsell. Accounts vary in wording, but the famous tale is that a customer asked for a drink that would “wake me up and then mess me up.” While some details have blurred over time, Bradsell is generally credited with defining the modern version and helping make it a contemporary classic.

    ## A zero-proof coffee-bar version

    For a non-alcoholic riff, shake cooled espresso with a coffee syrup or zero-proof coffee spirit, a little simple syrup, and plenty of ice. Strain into a chilled coupe or cocktail glass. You’ll still get the cold, foamy, bittersweet character, just without the booze.
