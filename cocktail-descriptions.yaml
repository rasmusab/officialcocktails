  base_fname: moscow_mule
  image_path: cocktail-images/moscow_mule.jpeg
  hook: A Moscow mule is a popular cocktail made with vodka, ginger beer, and lime
    juice, served in a copper mug. The drink was first created in the 1940s and has
    since become a classic cocktail that is enjoyed by many.
  extended_method: |-
    To make a Moscow mule, you will need:
    - Vodka
    - Lime juice
    - Ginger beer
    - Ice
    - Lime or mint for garnish
    - Copper mug (optional)

    Follow these steps:
    1. Fill a highball glass or copper mug with ice.
    2. Add 4.5 cl (9 parts) of vodka to the glass.
    3. Pour in 12 cl (24 parts) of ginger beer.
    4. Add 1 cl (2 parts) of lime juice.
    5. Stir the ingredients gently to combine.
    6. Garnish with a lime wedge or mint sprig.
    7. Serve and enjoy your refreshing Moscow mule!
  tips: "-  Use a high-quality vodka: The vodka is the star of the Moscow mule, so
    make sure you use a high-quality vodka that you would enjoy on its own.\n\n- Use
    freshly squeezed lime juice: Avoid using pre-made lime juice as they often contain
    artificial flavors and preservatives. Squeeze fresh lime juice for the best taste.\n\n-
    Use ginger beer: Ginger beer is the key to a great Moscow mule. It's important
    to choose a good quality ginger beer that is not too sweet, and has a sharp ginger
    flavor.\n\n- Use a copper mug: A copper mug not only gives the drink a classic
    look, but it also keeps the drink cold for longer, thanks to the metal's temperature-conducting
    properties.\n\n- Garnish with fresh mint and a lime wedge: A sprig of fresh mint
    and a wedge of lime add a pop of color and flavor to your Moscow mule. \n\n- Don't
    overdo it on the ice: A few large ice cubes will keep your drink chilled without
    watering it down too quickly. \n\n- Remember the ratio: The classic Moscow mule
    ratio is 2:1:1 (2 parts vodka, 1 part lime juice, 1 part ginger beer). Adjust
    to your personal taste."
  fun_facts: |-
    1. Moscow Mule is a cocktail made with vodka, ginger beer, and lime juice, often served in a copper mug.
    2. The Moscow Mule was created in the 1940s, when a liquor importer and a ginger beer maker teamed up to sell both products.
    3. The copper mugs are not just for show - they actually help keep the drink colder for longer due to their temperature-conductive properties.
    4. The Moscow Mule is sometimes referred to as a "Mule" for short.
    5. In the 1950s, the Moscow Mule became popular with Hollywood actors and celebrities, leading to a surge in its popularity across the United States.
  alcohol_free_alternative: An alcohol free alternative to the drink Moscow mule could
    be a virgin or alcohol-free Moscow mule. This can be made using the same ingredients
    as the original cocktail with the exception of vodka. Instead of vodka, ginger
    beer and lime juice are mixed with ice and served in a copper mug for an authentic
    feel to the drink. Another alternative could be a ginger ale or soda infused with
    lime juice and a dash of bitters for a tangy and refreshing non-alcoholic beverage.
  page_body: |-
    ## Build a crisp Moscow Mule in a copper mug

    1. Fill a chilled copper mug generously with fresh ice, ideally solid cubes that melt slowly and keep the drink sharp rather than watery.
    2. Pour in the vodka first so it settles evenly through the ice. Add the lime juice next; freshly squeezed juice gives the drink a brighter, cleaner snap.
    3. Top with ginger beer, leaving a little room at the top so the drink can be stirred without losing carbonation.
    4. Give it one brief, gentle stir—just enough to combine the citrus, spirit, and ginger beer. Over-stirring will flatten the fizz.
    5. Taste if you like: if it feels too sharp, add a touch more ginger beer; if it feels too soft, a small squeeze of lime will tighten it up.
    6. Garnish with a lime wedge or wheel. A sprig of mint is optional, but it adds a fresh aroma that works especially well with the spicy ginger.

    ## What the Moscow Mule tastes like

    A Moscow Mule is light, fizzy, and cold, with a clean vodka base that lets the ginger beer do most of the talking. The lime adds a tart edge that keeps the sweetness in check, while the ginger brings peppery heat and a slightly earthy finish. It is refreshing rather than boozy, which is part of why it became such a durable crowd-pleaser.

    ## Why the copper mug matters

    The copper mug is more than a visual trademark. It chills quickly and makes the drink feel extra cold in the hand and on the lips, which heightens the Mule’s refreshing character. If you do not have one, a highball glass works perfectly well, but the copper vessel is a big part of the classic experience.

    ## A short origin story

    The Moscow Mule is generally traced to the United States in the 1940s, most often linked to Los Angeles. The most widely accepted story connects a vodka distributor, a ginger beer producer, and a seller of copper mugs who helped popularize the drink together. Some details vary depending on the source, but its role in boosting vodka’s profile in America is widely repeated.

    ## Easy zero-proof Mule

    For a non-alcoholic version, skip the vodka and use extra ginger beer with fresh lime over ice. If you want more body, add a splash of chilled soda water or a non-alcoholic spirit alternative. Keep the copper mug, the lime garnish, and the cold temperature—the style still works beautifully without alcohol.
- category: Contemporary classics
  name: Pisco sour
  type: Cocktail
  served: 'Straight up: chilled, without ice'
  standard_drinkware: Old fashioned glass
  method: Vigorously shake contents in a cocktail shaker with ice cubes, then strain
    into a glass and garnish with bitters.
  ingredients:
  - 60 ml Pisco
  - 30 ml lemon juice
  - 20 ml simple syrup
  - 1 egg white
  - Several drops of aromatic bitters at the end
  base_fname: pisco_sour
  image_path: cocktail-images/pisco_sour.jpeg
  hook: Pisco sour is a traditional cocktail made with pisco, lime juice, simple syrup,
    and egg white. It originates from Peru and Chile and is a popular drink in South
    America.
  extended_method: |-
    1. Combine 60 ml of Pisco, 30 ml of lemon juice, and 20 ml of simple syrup in a cocktail shaker.
    2. Add one egg white to the mixture.
    3. Fill the cocktail shaker with ice cubes.
    4. Vigorously shake the contents for 10-15 seconds until they have blended and the egg white is frothy.
    5. Strain the mixture into an Old fashioned glass using a strainer to remove ice chunks.
    6. Add a few drops of aromatic bitters to the top of the frothy mixture.
    7. Garnish the top of the cocktail with additional bitters or a lemon slice, as desired.
  tips: |-
    - Use fresh lime juice for a tangy taste.
    - Experiment with different ratios of Pisco to sugar to find the perfect balance for your taste.
    - Shake the ingredients vigorously with ice to create a frothy texture.
    - Add a dash of Angostura bitters on top for a unique flavor.
    - Serve chilled in a chilled glass for a refreshing drink.
  fun_facts: |-
    1. Pisco sour is a cocktail that originated in Peru in the 1920s.
    2. Its main ingredient, Pisco, is a type of brandy made from grapes that are grown in Peru or Chile.
    3. The cocktail consists of Pisco, lime juice, simple syrup, egg white, and bitters, which are shaken together and served over ice.
    4. In Peru, there is a National Pisco Sour Day celebrated on the first Saturday in February.
    5. The Pisco sour is said to have been invented by a bartender named Victor Morris, who opened Morris' Bar in Lima in 1916.
  alcohol_free_alternative: One alternative to Pisco sour could be a virgin mojito.
    The virgin mojito is a refreshing and delicious mocktail that can be easily made
    by mixing lime juice, fresh mint leaves, and simple syrup with soda water or sparkling
    water. The combination of tangy lime juice, sweet syrup, and refreshing mint leaves
    creates a flavor similar to Pisco sour. The virgin mojito is perfect for those
    who do not consume alcohol and still want to enjoy a tasty and refreshing drink.
    It can be garnished with fresh mint leaves and lime wedges for a beautiful presentation.
  page_body: |-
    ## Shaking a silky Pisco Sour

    1. Chill an old fashioned glass while you build the drink so the finished sour stays cold and frothy for longer.
    2. Add pisco, fresh lemon juice, simple syrup, and egg white to a shaker. If you want especially dense foam, start with a dry shake first, without ice, for about 10 seconds.
    3. Add ice and shake again, hard and long, until the tin feels very cold. The goal is full dilution plus a tight, creamy head from the egg white.
    4. Double strain into the chilled glass to catch small ice shards and any uneven bits of foam, giving the drink a smooth surface.
    5. Dot the top with a few drops of aromatic bitters. Leave them as drops or drag a pick through them for a simple pattern.
    6. Serve immediately, straight up and without ice, while the foam is tall and the citrus still tastes bright.

    ## What it tastes like in the glass

    A Pisco Sour is bright, soft, and creamy at once. The base spirit brings floral, grape-like notes, while the lemon adds sharp freshness. Sugar rounds out the edges, and the egg white creates that signature velvety texture rather than adding noticeable flavor. The bitters on top give the first sip a warm spice aroma that makes the drink feel more layered than a standard sour.

    ## Peru, Chile, and a debated backstory

    The Pisco Sour is strongly associated with Peru, though pisco itself is also central to Chilean drinking culture, and both countries have long debated aspects of the drink’s heritage. The most widely repeated story places the modern cocktail in Lima in the early 20th century, often linked to bartender Victor Vaughen Morris and later refinements by local bar staff. Exact details vary, but Peru is the most credible home of the classic template recognized today.

    ## Getting the best serve

    Fresh citrus matters more here than almost anywhere. Bottled juice makes the drink taste flat fast. If you are nervous about egg white, use pasteurized egg white for a similar foam and texture. The drink should be cold but not watery, so shake thoroughly, then serve right away.

    ## Easy alcohol-free riff

    For a zero-proof version, use a non-alcoholic grape-based spirit alternative or even white grape juice with a small splash of apple cider vinegar for structure. Shake that with lemon, simple syrup, and egg white or aquafaba, then finish with bitters if your chosen brand is alcohol-free.
- category: Contemporary classics
  name: Piña colada
  type: Cocktail
  served: 'Frozen: blended with ice'
  standard_drinkware: Poco Grande glass
  method: Blend all the ingredients with ice in an electric blender, pour into a large
    goblet or Hurricane glass and serve.
  ingredients:
  - 5 parts white rum
  - 3 parts coconut cream
  - 5 parts fresh pineapple juice
  base_fname: pi_a_colada
  image_path: cocktail-images/pi_a_colada.jpeg
  hook: A Piña colada is a tropical cocktail made with coconut cream, pineapple juice,
    and rum. It is typically served blended or shaken and garnished with a pineapple
    wedge and a maraschino cherry.
  extended_method: |-
    1. Add 5 parts of white rum to the blender.
    2. Add 3 parts of coconut cream into the blender.
    3. Add 5 parts of freshly squeezed pineapple juice into the blender.
    4. Add a generous amount of ice cubes into the blender.
    5. Blend all the ingredients together until smooth and frothy.
    6. Pour the mixture into a Poco Grande glass or Hurricane glass.
    7. Garnish with a slice of pineapple, a cherry, or a cocktail umbrella.
    8. Serve immediately and enjoy!
  tips: "- Use fresh pineapple juice and coconut cream for the best flavor. \n- Use
    crushed ice to achieve the perfect texture. \n- Don't be afraid to adjust the
    sweetness to your personal preference with additional pineapple juice or simple
    syrup. \n- Serve in a chilled, frosted glass with a pineapple wedge and a maraschino
    cherry for a beautiful presentation."
  fun_facts: |-
    1. The Piña Colada was first created in Puerto Rico in the 1950s, although there is some debate over who first invented the drink.
    2. The name "Piña Colada" means "strained pineapple" in Spanish.
    3. The Piña Colada is the official drink of Puerto Rico.
    4. In 1978, Rupert Holmes wrote a song called "Escape (The Piña Colada Song)" that became a hit in the United States.
    5. The Piña Colada was declared the official drink of Puerto Rico in 1978.
  alcohol_free_alternative: A popular alcohol-free alternative to the Piña colada
    is the Virgin Piña colada. This refreshing tropical drink consists of coconut
    milk, pineapple juice, and ice, blended together until smooth. It has the same
    creamy texture and tropical flavor as the original cocktail, but without the added
    alcohol. Another option is to make a mocktail combining pineapple juice, coconut
    water, lime juice, and a splash of grenadine for a colorful twist. This drink
    is perfect for those who want to enjoy the taste of a Piña colada without the
    effects of alcohol.
  page_body: |-
    ## Blending a smooth, bar-style Piña Colada

    1. Fill a blender with a generous scoop of fresh ice so the finished drink comes out thick and frosty rather than watery.
    2. Add white rum, coconut cream, and pineapple juice in the proper balance, aiming for a rich texture with bright tropical fruit at the front.
    3. Blend on high until the mixture is fully smooth and creamy, with no large ice pieces left. If it looks too stiff, add a small splash of pineapple juice; if it seems loose, blend in a little more ice.
    4. Taste before pouring. A good Piña Colada should feel lush and sweet, but still lively from the pineapple’s acidity.
    5. Pour into a chilled Poco Grande glass, or another large curved goblet if that is what you have.
    6. Serve immediately while the texture is still frozen and airy. A pineapple wedge or cherry works well if you want a classic tropical finish.

    ## What the Piña Colada should taste like

    This drink is all about creamy tropical balance. The rum brings light warmth, coconut cream gives it a dessert-like body, and pineapple juice keeps the whole thing from becoming heavy. When made well, it should be velvety and cold, with a texture closer to a drinkable sorbet than a standard shaken cocktail.

    Because it is blended, dilution matters a lot. Too much ice and it goes flat; too little and it becomes overly rich. The sweet spot is thick enough to mound slightly when poured.

    ## Puerto Rico, fame, and disputed beginnings

    The Piña Colada is most closely associated with Puerto Rico and is widely treated as the island’s signature cocktail. Its exact origin is debated, with several bartenders and bars claiming to have created it in the 20th century. The most widely repeated story credits Ramón “Monchito” Marrero at the Caribe Hilton in San Juan in the 1950s, though competing claims exist.

    Whatever its precise birthplace, by the mid-20th century it had become one of the defining tropical cocktails worldwide.

    ## Easy zero-proof tropical version

    For a non-alcoholic take, leave out the rum and increase the pineapple juice slightly, or add a small splash of coconut water to lighten the texture. Blend as usual with ice for a frozen pineapple-coconut cooler.

    If you want more complexity without alcohol, a few drops of vanilla extract can add warmth and roundness. Keep the drink cold and serve right away for the best creamy texture.
- category: Contemporary classics
  name: Sea breeze
  type: Mixed drink
  served: 'On the rocks: poured over ice'
  standard_drinkware: Highball glass
  method: Build all ingredients in a highball glass filled with ice. Garnish with
    lime wedge.
  ingredients:
  - 4 cl Vodka
  - 12 cl Cranberry juice
  - 3 cl Grapefruit juice
  base_fname: sea_breeze
  image_path: cocktail-images/sea_breeze.jpeg
  hook: Sea breeze is a refreshing alcoholic cocktail made with vodka, grapefruit
    juice, and cranberry juice. It is often served over ice and garnished with a slice
    of lime.
  extended_method: |-
    1. Fill a highball glass with ice cubes.
    2. Add 4 cl of vodka to the glass.
    3. Pour in 12 cl of cranberry juice.
    4. Add 3 cl of grapefruit juice to the mix.
    5. Use a bar spoon to gently stir the ingredients together.
    6. Garnish the drink with a lime wedge on the rim of the glass.
    7. Serve and enjoy your refreshing Sea breeze drink!
  tips: |-
    - Use fresh-squeezed grapefruit juice for the best flavor.
    - Use quality vodka to avoid a harsh taste.
    - Make sure to add the cranberry juice last to avoid too much color or sweetness.
    - Use a Collins glass filled with ice and garnish with a grapefruit slice for presentation.
  fun_facts: |-
    1. Sea breeze is a popular cocktail made with vodka, grapefruit juice, and cranberry juice.
    2. The drink was created in the 1920s and named after the cooling sea breezes that blow across the Atlantic.
    3. The Sea breeze is a variation of the Cape Codder cocktail which only contains vodka and cranberry juice.
    4. The drink gained popularity in the 1970s as a refreshing and easy-to-make summer cocktail.
    5. Sea breeze is often garnished with a wedge of lime or a grapefruit peel to add extra flavor and visual appeal.
  alcohol_free_alternative: |-
    An alcohol-free alternative to Sea Breeze can be made using cranberry juice, grapefruit juice, and soda water. Here's the recipe:

    Ingredients:
    - 1/2 cup cranberry juice
    - 1/2 cup grapefruit juice
    - Club soda or sparkling water
    - Ice
    - Lime wedge for garnish (optional)

    Instructions:
    1. Fill a glass with ice.
    2. Pour cranberry juice and grapefruit juice over the ice.
    3. Top up the drink with club soda or sparkling water.
    4. Give it a quick stir to mix everything together.
    5. Garnish with a lime wedge, if desired.
    6. Enjoy your refreshing alcohol-free Sea Breeze alternative!
  page_body: |-
    ## Building a Sea Breeze over ice

    1. Fill a chilled highball glass to the top with fresh ice. Plenty of ice matters here: it keeps the drink crisp and prevents the fruit juices from turning flat too quickly.
    2. Pour in the vodka first so it settles evenly through the cubes. Use a clean, neutral style unless you want a citrus-forward vodka to brighten the drink.
    3. Add the cranberry juice, then the grapefruit juice. Pouring the juices after the spirit helps the color develop into that signature rosy-pink shade.
    4. Give the drink a brief, gentle stir—just enough to combine everything without knocking too much chill off the ice.
    5. Taste, if desired. If your grapefruit is especially tart, the cranberry will balance it; if the cranberry is sweetened, the finish will be rounder and softer.
    6. Garnish with a lime wedge on the rim or tucked beside the ice. A light squeeze just before drinking adds a sharper citrus lift.

    ## What the Sea Breeze tastes like

    The Sea Breeze is bright, lightly bitter, and refreshing, with cranberry bringing tart berry character and grapefruit adding a drier citrus edge. Compared with many vodka highballs, it feels fruit-forward without becoming heavy or dessert-like. It works especially well for warm weather, brunch, or any occasion where you want something easygoing but not overly sweet.

    ## Best way to serve it well

    Use plenty of solid ice and serve it immediately after stirring. Because this drink is built directly in the glass, dilution continues as it sits, so colder ingredients make a noticeable difference. If you want a sharper version, use unsweetened cranberry and freshly squeezed grapefruit. If you prefer it softer, a sweeter cranberry juice cocktail gives a smoother, more approachable result.

    ## A little history and bar trivia

    The Sea Breeze is usually grouped with the Cape Codder and Bay Breeze, a family of vodka-and-juice drinks popular in the late 20th century. Its modern form became especially associated with the rise of cranberry marketing in the United States from the 1950s onward. Exact authorship is unclear, but its most credible origin story is less about one bartender and more about the era’s growing taste for simple, refreshing mixed drinks built around vodka and fruit juice.

    ## Easy alcohol-free version

    For a zero-proof take, replace the vodka with chilled soda water or a non-alcoholic spirit alternative. Keep the cranberry and grapefruit, build over ice the same way, and finish with lime. The result is zesty, tart, and still very much in the Sea Breeze style.
- category: Contemporary classics
  name: Sex on the beach
  type: Cocktail
