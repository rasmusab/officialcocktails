  page_body: "## How to mix a crisp, balanced Sidecar\n\n1. Chill a cocktail glass
    first so the drink stays bright and cold from the first sip to the last.  \n2.
    Fill a shaker generously with fresh ice; plenty of ice helps the drink chill quickly
    without turning watery.  \n3. Add the cognac, orange liqueur, and freshly squeezed
    lemon juice. Fresh citrus matters here, since the drink has nowhere to hide.  \n4.
    Shake hard for about 10 to 15 seconds, until the shaker feels very cold in your
    hands and the mixture is properly diluted.  \n5. Fine strain into the chilled
    glass for a smooth, clean texture with no ice chips or pulp.  \n6. If you like,
    sugar half the rim before pouring for a classic old-school touch that softens
    the sharp citrus edge.  \n7. Garnish with a thin orange or lemon twist, expressed
    over the surface to add a quick burst of fragrant oils.\n\n## What the Sidecar
    tastes like\n\nA Sidecar sits in the same family as other spirit-sour classics,
    but it leans richer and more elegant than many of them. The brandy base gives
    warmth and depth, the orange notes add a rounded sweetness, and the lemon keeps
    everything taut and lively. Done well, it should taste dry, silky, and focused
    rather than sugary or harsh.\n\n## The most likely story behind the name\n\nThe
    exact origin is disputed, which is common with early 20th-century classics. The
    most credible stories place the drink in either London or Paris around the end
    of World War I. One popular tale says it was named for a customer who arrived
    in a motorcycle sidecar, though that detail is difficult to verify. What is clear
    is that the Sidecar became one of the foundational brandy cocktails of the classic
    bar canon.\n\n## Small choices that improve the serve\n\nUse a good cognac or
    quality brandy with enough character to stand up to the citrus. If the drink tastes
    too sharp, the issue is often under-dilution rather than the recipe itself, so
    shake confidently. A sugared rim is optional: some people love the contrast, others
    prefer the drier, cleaner style without it.\n\n## A no-proof Sidecar-style version\n\nFor
    a non-alcoholic riff, combine a zero-proof brandy alternative with orange cordial
    or a non-alcoholic orange aperitif and fresh lemon juice. Shake with ice and strain
    into a chilled cocktail glass. A tiny pinch of salt can help mimic the rounded
    depth that spirits usually provide."
