  fun_facts: "1. **Origin:** Golden dream is believed to have originated in the 1950s
    at a bar in California called 'Old King Cole's'. \n2. **Ingredients:** The drink
    is made with a combination of vodka, triple sec, orange juice, and a hint of Galliano
    liqueur. \n3. **Appearance:** The unique combination of ingredients gives the
    drink a bright golden color, which is how it got its name 'Golden Dream'. \n4.
    **Popular culture:** The Golden dream cocktail gained popularity in the 1970s
    and 80s, featuring in popular movies such as 'Casino' and 'Wall Street'. \n5.
    **Variations:** The original recipe has undergone various tweaks and adjustments
    over the years, with some variations including the use of cream or different types
    of liqueurs."
  alcohol_free_alternative: One great alternative to the drink Golden Dream is called
    "Virgin Sunrise." This alcohol-free drink is a refreshing and delicious blend
    of orange juice, grenadine, and pineapple juice. It's easy to make by simply mixing
    equal parts of orange juice and pineapple juice together, then adding a splash
    of grenadine for a vibrant pop of color. Serve it over ice with a slice of fresh
    orange or pineapple for an extra burst of flavor. This fun and fruity mocktail
    is perfect for any occasion and is sure to be a crowd-pleaser!
  page_body: |-
    ## Shaking a Golden Dream to a fluffy finish

    1. Chill a cocktail glass first so the drink stays cold and silky after pouring. A few minutes in the freezer works well.
    2. Add Galliano, orange liqueur, fresh orange juice, and fresh cream to a shaker. Use freshly squeezed juice if possible; bottled juice makes the drink flatter and less bright.
    3. Fill the shaker with cracked ice rather than large cubes. The smaller pieces help whip the cream slightly and give the cocktail its soft, airy texture.
    4. Shake hard for about 12 to 15 seconds. You want the mixture thoroughly chilled and lightly frothy, not heavy or under-aerated.
    5. Fine strain into the chilled glass to keep out ice shards and preserve the smooth, elegant surface.
    6. Serve immediately, straight up. The ideal Golden Dream should look pale, creamy, and lightly mousse-like on top.

    ## What the Golden Dream tastes like

    This cocktail sits in a dessert-like space without becoming overly rich. Galliano brings vanilla and herbal sweetness, the orange element adds citrus lift, and the cream rounds everything into a soft, velvety sip. The result is lush but still bright, with a texture that should feel light rather than thick. If it seems dense, it likely needed a stronger shake.

    ## Why the balance matters

    Because the build is evenly split between the liqueurs and juice, small changes show up quickly. Fresh orange juice keeps the drink lively, while too much cream can mute its perfume. Served in a cocktail glass and without ice, it works best very cold and in a modest portion. This is a good after-dinner choice, but it can also fit a retro-style cocktail lineup.

    ## Golden Dream backstory and bar trivia

    The exact origin is not perfectly documented, but the most widely repeated story places the drink in the late 1960s and links it to bartender Raimundo Alvarez in Miami. It gained wider recognition during the era when creamy, aromatic cocktails were enjoying a surge in popularity. Whether every detail of that story is fully verifiable, the drink is firmly associated with that mid-century-to-late-century glamour style.

    ## A zero-proof orange-vanilla version

    For a non-alcoholic take, shake orange juice, a splash of non-alcoholic orange aperitif or orange syrup, a little vanilla syrup, and light cream or a plant-based alternative with ice. Strain into a chilled glass. Keep the texture fluffy and the citrus fresh so it still feels like a proper cocktail rather than a smoothie.
- category: Contemporary classics
  name: Grasshopper
  type: Cocktail
  served: 'Straight up: chilled, without ice'
  standard_drinkware: Cocktail glass
  method: Pour ingredients into a cocktail shaker with ice. Shake briskly and then
    strain into a chilled cocktail glass.
  ingredients:
  - 3 cl crème de menthe (green)
  - 3 cl crème de cacao (white)
  - 3 cl cream
  base_fname: grasshopper
  image_path: cocktail-images/grasshopper.jpeg
  hook: Grasshopper is a sweet, creamy cocktail made with crème de menthe, crème de
    cacao, and cream. It is typically served after-dinner as a digestif.
  extended_method: |-
    1. Take a cocktail shaker and fill it with ice
    2. Pour 3 cl crème de menthe (green) into the shaker
    3. Add 3 cl crème de cacao (white) into the shaker
    4. Pour 3 cl cream into the shaker
    5. Shake the mixture in the shaker vigorously for a few seconds
    6. Take a chilled cocktail glass and strain the mixture into it
    7. Serve the cocktail immediately.

    Enjoy your delicious Grasshopper!
  tips: "- Use equal parts crème de menthe, crème de cacao, and heavy cream for a
    balanced flavor.\n- Shake the ingredients vigorously with ice cubes to ensure
    a frothy texture.\n- Serve the Grasshopper in a chilled glass and garnish with
    a sprig of mint for an extra touch of freshness. \n- Adjust the ingredient ratios
    to taste, but be careful not to add too much crème de menthe as it can overpower
    the other flavors."
  fun_facts: |-
    1. The Grasshopper cocktail was first introduced in the early 20th century and gained popularity during the 1950s and 1960s.
    2. The original recipe calls for equal parts crème de menthe, crème de cacao, and cream.
    3. The Grasshopper is often served as an after-dinner drink or dessert cocktail.
    4. Variations of the Grasshopper include using different types of liqueurs or adding ice cream to make it more of a milkshake-style drink.
    5. The Grasshopper is a signature drink of New Orleans and is commonly found on the menus of French Quarter restaurants and bars.
  alcohol_free_alternative: One alcohol-free alternative to the Grasshopper is the
    "Virgin Mint Choco-Chip Shake". This chilled and creamy dessert is made with vanilla
    ice cream, fresh mint leaves, and chocolate chips blended together until smooth.
    It has the refreshing taste of mint with the indulgent flavor of chocolate, delivering
    a sweet and decadent sensation while remaining completely alcohol-free. This mocktail
    is perfect for those who want to satisfy their sweet tooth without the buzz from
    alcohol. It can be garnished with a sprig of fresh mint and served in a classic
    milkshake glass for a fun and retro look.
  page_body: |-
    ## Shaking a Grasshopper to a Smooth, Minty Finish

    1. Chill a cocktail glass in the freezer or fill it with ice water while you prepare the drink. A very cold glass helps the creamy texture stay lush and velvety.
    2. Fill a shaker with fresh ice. Add equal measures of green mint liqueur, white cacao liqueur, and cream.
    3. Shake hard for 10 to 15 seconds. Because dairy is involved, a brisk shake is important: it both chills the mixture thoroughly and gives the drink its light, silky body.
    4. Empty the ice water from the glass, if using, and strain the cocktail finely into the chilled glass.
    5. Serve immediately, straight up and without ice. The drink is at its best when very cold and freshly shaken.
    6. If you want a slightly lighter texture, use half-and-half instead of full cream; for a richer dessert-style version, keep the cream cold and full-bodied.

    ## What the Grasshopper Tastes Like

    The Grasshopper is sweet, cool, and unmistakably dessert-like. Expect a combination of mint chocolate flavors, softened by cream into something close to a liquid after-dinner treat. The green mint element gives it a vivid look and a fresh aroma, while the cacao note keeps it from tasting like candy alone.

    Because all three parts are typically used in equal proportion, balance matters more than complexity here. If one bottle is especially sweet, a slightly firmer shake and extra chilling can help keep the drink from feeling heavy.

    ## Best Way to Serve It

    This cocktail belongs in a stemmed cocktail glass and should be served straight up, well chilled. It works best after dinner, alongside chocolate desserts, or as a retro party drink. A small mint sprig or a light dusting of shaved chocolate can work, but garnish is optional; the classic presentation is simple.

    ## Retro Roots and a Bit of Mystery

    The Grasshopper is usually linked to New Orleans, often associated with Tujague’s bar in the early 20th century. Precise origin details are a little fuzzy, but that is the most widely repeated and credible story. It became especially popular in the mid-20th century, when creamy cocktails had a major moment in hotel bars and home entertaining.

    ## Easy Alcohol-Free Take

    For a zero-proof version, shake together a mint syrup, a chocolate syrup or cocoa cream mixture, and chilled cream or a plant-based alternative. Keep the mint restrained so it stays smooth rather than toothpaste-bright. Strain into a chilled glass for a mocktail that still feels close to the original’s mint-chocolate-dessert character.
- category: Contemporary classics
  name: Hemingway special
  type: Mixed drink
  served: 'Straight up: chilled, without ice'
  standard_drinkware: Cocktail glass
  method: Pour all ingredients into a shaker with ice. Shake.
  ingredients:
  - 6 cL (12 parts) Rum
  - 4 cl (8 parts) grapefruit juice
  - 1.5 cL (3 parts) Maraschino liqueur
  - 1.5 cl (3 parts) fresh lime juice
  base_fname: hemingway_special
  image_path: cocktail-images/hemingway_special.jpeg
  hook: The Hemingway Special is a classic cocktail made with white rum, grapefruit
    juice, maraschino liqueur, and fresh lime juice. Named after the famous author
    who loved to drink and write, this refreshing and tangy cocktail is perfect for
    summer sipping.
  extended_method: |-
    To make a Hemingway special drink:
    1. Add 6 cL of rum, 4 cl of grapefruit juice, 1.5 cL of Maraschino liqueur, and 1.5 cl of fresh lime juice to a shaker with ice.
    2. Close the shaker tightly and shake vigorously for about 10-15 seconds.
    3. Strain the mixture into a chilled cocktail glass.
    4. Garnish with a slice of grapefruit, lime wheel, or cocktail cherry, if desired.
    5. Serve and enjoy the delicious Hemingway special drink!
  tips: |-
    - Use a good quality rum such as Papa's Pilar or Flor de Caña.
    - Use fresh grapefruit juice and fresh lime juice for a bright and tangy flavor.
    - Use honey instead of simple syrup for a slightly sweeter and richer taste.
    - Shake the ingredients vigorously with ice for at least 15 seconds to properly dilute and chill the drink.
    - Strain the drink into a chilled coupe glass for an elegant presentation.
    - Garnish the drink with a twist of grapefruit or lime peel for a pop of color and added citrus aroma.
  fun_facts: |-
    1. The Hemingway Special is a cocktail that was created specifically for writer and adventurer, Ernest Hemingway.
    2. Hemingway was a diabetic, so this cocktail was made without sugar (which is unusual for most cocktails).
    3. Also known as the "Papa Doble," the Hemingway Special features rum, grapefruit juice, lime juice, and maraschino liqueur.
    4. The cocktail was said to be Hemingway's favorite, and he was known to consume several of them in one sitting.
    5. The Hemingway Special is often served with a grapefruit wedge, as the acidity of the fruit complements the flavors in the cocktail.
  alcohol_free_alternative: |-
    The Hemingway Special is a cocktail made with rum, grapefruit juice, lime juice, and maraschino liqueur. An alcohol-free alternative to this drink could be a mocktail that includes the same fruity and citrusy flavors but omits the rum and maraschino liqueur.

    Here's a recipe for an alcohol-free version of the Hemingway Special:

    Ingredients:
    - 3 oz grapefruit juice
    - 1 oz lime juice
    - 1 oz simple syrup
    - Club soda
    - Grapefruit slice for garnish

    Instructions:
    1. Add grapefruit juice, lime juice, and simple syrup to a shaker filled with ice.
    2. Shake well and strain into a glass filled with ice.
    3. Top with club soda and stir gently.
    4. Garnish with a grapefruit slice.

    This mocktail version of the Hemingway Special is refreshing and tangy, with a hint of sweetness from the simple syrup. The club soda adds a bit of fizz and makes the drink feel extra refreshing. It's a perfect alternative for anyone looking for a non-alcoholic option that still has plenty of flavor.
  page_body: |-
    ## Shaking a Hemingway Special the right way

    1. Chill a cocktail glass first so the drink stays brisk and clean when served straight up. A few minutes in the freezer works well, or fill the glass with ice water while you mix.
    2. Add white rum, freshly squeezed grapefruit juice, fresh lime juice, and maraschino liqueur to a shaker.
    3. Fill the shaker generously with ice. Plenty of ice helps the drink reach the right dilution without turning thin or watery.
    4. Shake hard for about 10 to 15 seconds, until the outside of the shaker feels very cold. This cocktail benefits from a lively shake because citrus and liqueur need to integrate fully.
    5. Empty the chilling ice from the glass if needed, then fine-strain the drink into the chilled cocktail glass for a smooth, pulp-free finish.
    6. Serve immediately. If you want a garnish, a thin grapefruit twist is the most natural fit, but many versions are left unadorned.

    ## What the Hemingway Special tastes like

    This is a leaner, sharper Daiquiri relative: bright citrus up front, a dry cherry-almond edge from maraschino, and a crisp rum backbone underneath. Grapefruit gives it bitterness and lift, while lime keeps the structure tight. It is less plush and sugary than many modern sours, which is exactly the appeal.

    ## Getting the balance right

    The drink can swing tart very quickly, especially with assertive grapefruit. If your fruit is particularly sharp, a tiny touch more maraschino can soften the edges without making the drink feel sweet. A light, clean rum usually keeps the profile snappy; richer aged styles can work, but they tend to pull the drink away from its classic briskness.

    ## Havana roots and the Hemingway connection

    The Hemingway Special is generally linked to El Floridita in Havana and to Ernest Hemingway, who was known to spend time there. The exact evolution is a little murky, but the most credible story is that it developed from the Floridita Daiquiri family, adapted to suit Hemingway’s preference for less sugar and a more tart profile. It is now widely treated as a modern classic, even though its roots are closely tied to pre-revolution Cuban bar culture.

    ## A zero-proof version that still feels grown-up

    For a non-alcoholic riff, combine chilled white grapefruit juice, fresh lime juice, a small spoon of cherry syrup or non-alcoholic maraschino-style syrup, and a splash of non-alcoholic white rum alternative if you have one. Shake with ice and strain into a chilled glass. Keep it dry and citrus-forward rather than sweet to preserve the character of the original.
- category: Contemporary classics
  name: Horse's neck
  type: Highball
  served: 'On the rocks: poured over ice'
  standard_drinkware: Highball glass
  method: Pour brandy and ginger ale directly into highball glass with ice cubes.
    Stir gently. Garnish with lemon zest. If desired, add dashes of Angostura Bitter.
  ingredients:
  - 4 cL (1 part) Brandy
  - 12 cL (3 parts) Ginger ale
  - Dash of Angostura bitter (optional)
  base_fname: horse_s_neck
  image_path: cocktail-images/horse_s_neck.jpeg
  hook: Horse's neck is a cocktail made with brandy and ginger ale, garnished with
    a lemon twist. It's a classic drink that's both flavorful and refreshing.
  extended_method: |-
    1. Prepare a highball glass and fill it with ice cubes.
    2. Pour 4 cL (1 part) of Brandy into the glass.
    3. Add 12 cL (3 parts) of Ginger Ale to the glass.
    4. Gently stir the mixture.
    5. If desired, add a dash of Angostura Bitter to the drink.
    6. Garnish the drink with lemon zest.
    7. Serve the Horse's Neck drink and enjoy!
  tips: |-
    - Use a quality bourbon or rye whiskey for the base of your drink.
    - Make sure to use a long, spiraled strip of lemon peel for the horse's neck garnish.
    - Add a few dashes of aromatic bitters to balance out the sweetness of the ginger ale.
    - Serve over ice in a highball glass for the perfect refreshing sip.
  fun_facts: |-
    1. Horse's neck is a non-alcoholic drink made with ginger ale and a spiral of lemon peel.
    2. The drink is named after the shape of the lemon peel that resembles the neck of a horse.
    3. Horse's neck was a popular drink in the United States during the 19th century and is still served in some bars today.
    4. In Japan, Horse's neck is made with brandy or whiskey instead of ginger ale.
    5. Some variations of Horse's neck include adding a splash of bitters or substituting the lemon peel with lime or orange.
  alcohol_free_alternative: "Horse's neck is a cocktail typically made with brandy
    and ginger ale, often garnished with a long, thin twist of lemon peel. An alcohol-free
    alternative to this drink could be a mocktail called the \"Stablemate,\" which
    includes ginger beer, fresh lemon juice, and honey syrup. \n\nTo make a Stablemate,
    combine 6 oz of ginger beer in a cocktail shaker with ice. Add 1 oz of fresh lemon
    juice and 1 oz of honey syrup (which can be made by combining equal parts honey
    and hot water, and letting it cool). Shake until well mixed and strain into a
    chilled glass filled with ice. Garnish with a lemon twist or a slice of fresh
    ginger. \n\nThis refreshing and flavorful mocktail has the same bright citrus
    and spicy ginger flavors as a Horse's neck, but without the alcohol. It's perfect
    for anyone looking for a non-alcoholic option that still has lots of character
    and taste."
  page_body: |-
    ## Building a Horse’s Neck over ice

    1. Fill a chilled highball glass nearly to the top with fresh ice. Large, solid cubes work best because they melt more slowly and keep the drink lively instead of watered down.
    2. If you want the classic look, cut a long spiral of lemon peel before you start. Twist it gently over the glass to release its oils, then drape it inside so the peel hangs down like a “neck.”
    3. Pour the brandy over the ice first, letting it settle through the glass. This gives the drink its warm, rounded base.
    4. Top slowly with chilled ginger ale. Pouring gently helps preserve carbonation, which is a big part of the drink’s refreshing character.
    5. Stir once or twice with a bar spoon—just enough to combine, not enough to flatten the bubbles.
    6. Add a dash or two of aromatic bitters if you want a slightly spicier, more layered finish. This version is often called a “Horse’s Neck with a Kick.”
    7. Finish by expressing the lemon peel over the top and leaving it in the glass for aroma as you sip.

    ## What it tastes like

    The Horse’s Neck is light, fizzy, and easygoing, with brandy providing mellow fruit and oak beneath bright citrus and ginger spice. Without bitters, it drinks crisp and simple; with bitters, it becomes deeper and more old-school. It is a great choice for anyone who likes a refreshing highball that still feels a little refined.

    ## Why the lemon peel matters

    This cocktail is famous for its long lemon twist, and it is more than decoration. The peel adds a fragrant citrus note that sharpens the sweetness of the soda and lifts the richer notes of the spirit. If the peel is short, the drink still works—but the dramatic spiral is part of its identity.

    ## A bit of bar history

    The Horse’s Neck dates back to the late 19th century or early 20th century, though exact origins are murky. Early versions were sometimes non-alcoholic, built from ginger ale and lemon peel alone. The brandy version became a classic later, and bitters were eventually added in some recipes to give it extra snap.

    ## Easy alcohol-free version

    For a zero-proof take, use a good spicy ginger ale or ginger beer over ice with the same long lemon twist. Add a dash of non-alcoholic aromatic bitters if you have them. It keeps the bright, zesty personality of the original while staying entirely booze-free.
- category: Contemporary classics
  name: Irish coffee
  type: Mixed drink
  served: Hot
  standard_drinkware: Irish coffee mug
  method: Pour the coffee into a preheated glass, add whiskey and sugar, and stir
    until dissolved. Pour cream slowly to form a distinct layer.
  ingredients:
  - 50 ml Irish whiskey
  - 120 ml hot coffee
  - 50 ml fresh cream (chilled)
  - 1 tsp sugar
  base_fname: irish_coffee
  image_path: cocktail-images/irish_coffee.jpeg
  hook: Irish coffee is a hot cocktail made with hot coffee, Irish whiskey, brown
    sugar, and whipped cream. It is a popular after-dinner drink that originated in
    Ireland.
  extended_method: |-
    1. Preheat an Irish coffee mug by adding hot water.
    2. While the mug is preheating, brew a cup of hot coffee and chill fresh cream.
    3. Discard the hot water from the mug and pour in the hot coffee.
    4. Add Irish whiskey and sugar to the coffee and stir until the sugar is dissolved.
    5. Gently pour the chilled fresh cream over the back of a spoon, so that it floats on top of the coffee.
    6. Serve the Irish coffee immediately and enjoy!
  tips: |-
    - Use freshly brewed hot coffee and pour it into a pre-warmed glass.
    - Add a teaspoon of brown sugar and stir until dissolved.
    - Pour in a shot of Irish whiskey and stir briefly.
    - Gently pour cold whipped cream over the top, being careful not to mix it in too much.
    - Enjoy while hot and sip slowly through the cream.
  fun_facts: |-
    1. Irish coffee was invented by a chef named Joe Sheridan in 1942 at an airport in Ireland to warm up travelers.
    2. The coffee used in Irish coffee is typically brewed strong, and Irish whiskey is added to the coffee.
    3. To make the drink, sugar is added to the coffee, then Irish whiskey and cream are poured on top to create a layered effect.
    4. The drink gained popularity in the United States in the 1950s and 1960s thanks to a travel writer named Stanton Delaplane, who brought the recipe to San Francisco's Buena Vista Cafe.
    5. The Buena Vista Cafe claims to have served more than 40,000 Irish coffees per year since the drink was introduced, making their version of the drink famous around the world.
  alcohol_free_alternative: An alcohol-free alternative to Irish coffee could be a
    hot chocolate or a hot cider. One could add a whipped cream and sprinkle cinnamon
    or other spices for an extra touch of flavor. Another option could be a chai latte
    with a shot of espresso. It is a comforting and warming drink that is perfect
    for cold nights. One could add a little bit of honey or vanilla syrup and top
    it off with frothed milk for a delicious, non-alcoholic alternative to Irish coffee.
  page_body: |-
    ## Building an Irish Coffee with a proper cream cap

    1. Warm an Irish coffee mug or heatproof stemmed glass with hot water, then empty it. A preheated glass helps keep the drink hot from first sip to last.
    2. Add the sugar to the glass, then pour in freshly brewed hot coffee. Stir well so the sugar fully dissolves before adding anything else.
    3. Pour in the Irish whiskey and stir again. Taste briefly if you like—this is the point to adjust sweetness slightly, since the cream will mute the edges.
    4. Lightly whip or loosen very cold fresh cream until it is just thickened but still pourable. It should float, not sink.
    5. Hold a spoon just above the surface of the coffee and slowly pour the cream over the back of the spoon so it settles into a distinct top layer.
    6. Serve immediately without stirring. The classic experience is to drink the hot, sweetened whiskey-coffee through the cool cream.

    ## What it should taste like

    A well-made Irish Coffee is rich but not heavy: warm roasted coffee, mellow whiskey spice, gentle sweetness, and a silky cold cream finish. The contrast matters as much as the flavor. You want a hot base and a cool floating top, with enough sugar to round out bitterness and support the cream.

    ## Small details that make a big difference

    Use strong coffee rather than something thin or acidic. A medium to dark roast usually works best. The cream should be cold and only lightly thickened; if it is too loose, it disappears, and if too stiff, it sits like whipped topping instead of forming a smooth layer. A clear glass or classic Irish coffee mug shows off the layered look best.

    ## The story behind Irish Coffee

    Irish Coffee is most often linked to Joe Sheridan, a chef at Foynes airbase in Ireland in the 1940s, who reportedly created it to warm cold transatlantic passengers. The drink later became internationally famous after being introduced in the United States, especially at the Buena Vista Cafe in San Francisco. Exact retellings vary, but that Foynes origin is the most widely accepted account.

    ## Easy alcohol-free version

    For a zero-proof take, use a robust decaf or regular coffee with a spoonful of brown sugar and a splash of alcohol-free whiskey alternative, if available. Top with the same lightly whipped cream. You still get the signature hot-and-cool contrast, with much of the original comfort intact.
- category: Contemporary classics
  name: Kir
  type: Wine cocktail
  served: 'Straight up: chilled, without ice'
  standard_drinkware: Wine glass (white)
  method: Add the crème de cassis to the bottom of the glass, then top up with wine.
  notes: A recipe can be found at the International Bartenders Association website.
  ingredients:
  - 9 cl (9 parts) white wine
  - 1 cl (1 part) crème de cassis
  base_fname: kir
  image_path: cocktail-images/kir.jpeg
  hook: Kir is a popular French apéritif made by adding crème de cassis (blackcurrant
    liqueur) to dry white wine. It is typically served chilled as a refreshing and
    fruity cocktail.
  extended_method: |-
    1. Take a Wine glass (white).
    2. Measure and pour 1 cl (1 part) of crème de cassis into the bottom of the glass.
    3. Measure and pour 9 cl (9 parts) of white wine into the glass, filling it up to the top.
    4. Stir the mixture in the glass gently.
    5. Add ice if desired.
    6. Serve and enjoy!
  tips: |-
    - Chill the wine and the crème de cassis before preparing the drink.
    - Use a 1:5 ratio of crème de cassis to wine for the perfect balance of sweetness and acidity.
    - Swirl the crème de cassis at the bottom of the glass before pouring the wine on top for a beautiful color gradient.
    - Garnish with a twist of lemon peel for an extra pop of flavor.
  fun_facts: |-
    1. Kir is a French apéritif made by combining white wine with crème de cassis (blackcurrant liqueur).
    2. Kir was named after Félix Kir, a mayor of the Burgundy region in France, who popularized the drink in the 1940s.
    3. The classic ratio for Kir is four parts white wine to one part crème de cassis, but variations include using red wine instead of white or adding a splash of raspberry liqueur.
    4. In France, Kir is typically served before a meal as a palate cleanser and to stimulate the appetite.
    5. A variation of Kir, called Kir Royale, substitutes champagne for white wine, creating a more decadent and celebratory cocktail.
  alcohol_free_alternative: "An alcohol-free alternative to the drink Kir is a mocktail
    called “Berry Fizz”. \n\nIngredients: \n- 1/2 cup mixed berries (such as strawberries,
    raspberries, and blueberries)\n- 1 tbsp honey\n- 1/2 lime, juiced\n- 1/2 cup sparkling
    water\n- Ice\n\nInstructions:\n1. In a blender, blend mixed berries, honey, and
    lime juice until smooth.\n2. Strain the mixture into a glass filled with ice.\n3.
    Top with sparkling water and stir gently.\n4. Garnish with a lime wedge and a
    few fresh berries. \n\nEnjoy your refreshing and fruity non-alcoholic alternative
    to Kir!"
  page_body: |-
    ## Building a Kir in the wine glass

    1. Chill a white wine glass first so the drink stays crisp from the first sip to the last. A colder glass also helps preserve the refreshing character of the wine.
    2. Measure the crème de cassis and pour it into the bottom of the glass. Starting with the liqueur creates the classic look and lets it slowly mingle with the wine.
    3. Gently add well-chilled dry white wine. Pour slowly to avoid knocking out too much aroma and to keep the texture elegant rather than fizzy or splashed.
    4. If you like a more integrated drink, give it one brief, delicate stir. If you prefer the traditional presentation, leave it unstirred and let the flavors combine naturally as you drink.
    5. Serve immediately, straight up and without ice. The Kir is at its best when cold, light, and clean, with no dilution.
    6. Adjust future pours to taste: a touch more cassis makes it rounder and fruitier, while a drier white keeps it sharper and more aperitif-like.

    ## What the Kir tastes like

    Kir is a simple wine cocktail with a gently sweet, dark-berry accent layered over a dry white-wine base. The cassis adds blackcurrant richness, color, and a soft liqueur body, while the wine keeps the drink bright and lean. The result is low-effort but elegant: fruity, lightly tart, and very easy to sip before a meal.

    ## Choosing the wine and serving it well

    A dry, neutral-to-crisp white works best. Wines with fresh acidity help balance the sweetness of the blackcurrant liqueur, keeping the drink from feeling heavy. Serve it quite cold in a white wine glass, ideally alongside salty snacks, mild cheeses, or simple canapés. If your wine is already slightly aromatic or off-dry, use a lighter hand with the cassis.

    ## Burgundy roots and a famous name

    The Kir is most closely associated with Burgundy, France. It is widely linked to Félix Kir, a priest, Resistance member, and later mayor of Dijon, who helped popularize the drink in the mid-20th century. Exact origin details are a little murky, but this Burgundy connection is the most credible and commonly accepted account.

    ## A no-alcohol cassis spritz version

    For a non-alcoholic adaptation, use chilled alcohol-free white wine or a dry white grape sparkling drink with a small measure of blackcurrant syrup or alcohol-free cassis alternative. Keep the same build style in the glass and aim for balance rather than sweetness. The result won’t be identical, but it captures the Kir’s berry-and-white-wine feel surprisingly well.
