  type: Cocktail
  served: 'On the rocks: poured over ice'
  standard_drinkware: Zombie glass
  method: Mix ingredients in a shaker with crushed ice and shake. Pour into a tall
    tumbler glass.
  notes: Because of the high proof rum, this cocktail could be lit if desired.
  ingredients:
  - 45 ml Jamaican dark rum
  - 45 ml Puerto Rican gold rum
  - 30 ml 151 Demerara rum
  - 20 ml fresh lime juice
  - 15 ml falernum
  - 15 ml Donn's Mix (2 parts fresh white grapefruit juice and 1 part cinnamon syrup)
  - 1 tsp Grenadine syrup
  - 1 dash Angostura bitters
  - 6 drops Pernod
  base_fname: zombie
  image_path: cocktail-images/zombie.jpeg
  hook: Zombie is a cocktail that contains a mix of various rums, fruit juices, and
    syrups. It is famously known for its high alcohol content and its ability to leave
    its consumers feeling "undead".
  extended_method: |-
    ### Steps to Make a Zombie Drink

    1. Combine 45 ml Jamaican dark rum, 45 ml Puerto Rican gold rum, and 30 ml 151 Demerara rum in a cocktail shaker.
    2. Add 20 ml fresh lime juice, 15 ml falernum, and 15 ml Donn's Mix (2 parts fresh white grapefruit juice and 1 part cinnamon syrup) to the shaker.
    3. Add 1 tsp Grenadine syrup, 1 dash of Angostura bitters, and 6 drops of Pernod to the shaker.
    4. Fill the shaker with crushed ice and shake well.
    5. Strain the mixture into a tall tumbler glass.
    6. Garnish with a cherry and a slice of orange.
    7. Serve and enjoy the zombie drink in a zombie glass.
  tips: |-
    - 1 oz dark rum, 1 oz white rum, ½ oz apricot liqueur, ½ oz lime juice, ½ oz pineapple juice, ½ oz passion fruit syrup, 1 tsp grenadine, and a dash of Angostura bitters.
    - Top with crushed ice and garnish with fresh mint, cherry, and pineapple.
    - Make sure to use a good quality rum for a smooth finish.
    - Adjust sweetness level by adding or reducing the amount of syrup or grenadine.
    - For a spicier kick, add a few drops of hot sauce or a slice of fresh ginger.
  fun_facts: |-
    1. The Zombie cocktail was created in the 1930s by Donn Beach, also known as Don the Beachcomber, who was a pioneer of tropical-themed restaurants and bars.
    2. The cocktail was designed to be strong and potent, with multiple types of rum, fruit juices, and a splash of absinthe. In fact, it was reportedly so strong that Donn Beach would only serve two per customer.
    3. The name "Zombie" allegedly comes from the fact that after drinking one, you would feel like a zombie - disoriented and stumbling around.
    4. The original recipe for the Zombie was lost for many years, but was eventually discovered in a notebook from the 1930s.
    5. The Zombie has become a popular drink in tiki culture and is often served in fun, kitschy mugs shaped like skulls or tropical fruits.
  alcohol_free_alternative: |-
    An alcohol-free alternative to the drink Zombie can be a mocktail that has a similar fruity taste but without the rum. Here's one recipe for a non-alcoholic Zombie mocktail:

    Ingredients:
    - 2 oz pineapple juice
    - 2 oz orange juice
    - 1 oz lime juice
    - 1 oz passion fruit syrup
    - 1 oz grenadine syrup
    - 1 oz coconut cream
    - Sprite or soda water

    Instructions:
    1. Fill a shaker with ice.
    2. Add pineapple juice, orange juice, lime juice, passion fruit syrup, grenadine syrup, and coconut cream.
    3. Shake well until ingredients are mixed properly.
    4. Pour mixture into a tall glass.
    5. Top off with Sprite or soda water.
    6. Garnish with a mint sprig and a cherry.
    7. Serve and enjoy your Zombie mocktail!
  page_body: |-
    ## How to build a proper Zombie

    1. Fill a shaker about halfway with crushed ice so the drink chills quickly and picks up the right dilution.
    2. Add the two base rums, then the overproof Demerara rum, followed by the lime juice, falernum, Donn’s Mix, grenadine, bitters, and Pernod.
    3. Shake hard but briefly, about 8 to 10 seconds. You want the mixture cold and lightly aerated without melting too much of the ice.
    4. Pour everything, including the shaken ice, into a chilled Zombie glass or other tall tumbler.
    5. Top with a little extra crushed ice if needed to create a mounded surface and keep the drink frosty.
    6. Garnish simply if you like: a mint sprig, grapefruit wedge, or cherry all work well. If using the high-proof rum as a float for a flaming presentation, use extreme caution and extinguish before serving.

    ## What the Zombie tastes like

    A Zombie should come across as layered rather than merely strong. The dark and gold rums bring richness and vanilla-toned depth, while the overproof rum adds heat and a long finish. Lime keeps it sharp, falernum adds spiced sweetness, and Donn’s Mix contributes grapefruit brightness plus warm cinnamon. The Pernod and bitters sit in the background, giving the drink its slightly exotic, hard-to-pin-down edge.

    ## Getting the balance right over ice

    This drink is best when very cold and slightly diluted, so crushed ice matters. If it tastes too hot, the usual fix is a touch more shaking or a little more crushed ice rather than more sweetener. If it seems too sweet, a small extra squeeze of lime can pull it back into balance. Serve it immediately: the Zombie is at its best in the first few minutes, before the ice fully softens the structure.

    ## Tiki lore and the original Zombie

    The Zombie is most closely associated with Donn Beach, one of the founders of American tiki culture, who is generally credited with creating it in the 1930s. Exact early formulas are famously murky because many tiki recipes were guarded and changed over time. What is consistent is the drink’s reputation: it became one of the great high-octane tiki standards, often served with warnings about its potency.

    ## A no-proof tropical riff

    For a non-alcoholic version, combine fresh lime juice, white grapefruit juice, cinnamon syrup, a touch of grenadine, and a few drops of anise extract or alcohol-free absinthe alternative. Shake with crushed ice and top with a splash of non-alcoholic dark rum substitute or a little black tea for depth. You’ll get the spice-citrus profile and tiki mood without the alcohol.
- category: New era drinks
  name: Barracuda
  type: Cocktail
  served: 'Straight up: chilled, without ice'
  standard_drinkware: Margarita glass
  method: Shake pour ingredients with ice. Strain into glass, top with sparkling wine.
  ingredients:
  - 4.5 cl gold rum
  - 1.5 cl Galliano
  - 6 cl pineapple juice
  - 1 dash fresh lime juice
  - Top with Prosecco
  base_fname: barracuda
  image_path: cocktail-images/barracuda.jpeg
  hook: Barracuda is a popular tropical cocktail made with rum, pineapple juice, lime
    juice and a splash of blue curaçao. It is a refreshing and fruity drink that is
    perfect for sipping on a warm day.
  extended_method: |-
    1. Fill a shaker with ice.
    2. Add 4.5 cl of gold rum, 1.5 cl of Galliano, 6 cl of pineapple juice, and a dash of fresh lime juice to the shaker.
    3. Shake the ingredients vigorously for about 10-15 seconds.
    4. Strain the mixture into a Margarita glass.
    5. Top the drink with Prosecco.
    6. Garnish the drink with a fresh pineapple wedge or any other fruit of your choice.
    7. Serve and enjoy your delicious Barracuda cocktail!
  tips: |-
    - Fill a tall glass with ice cubes to the top to ensure your drink stays chilled.
    - Add 1 1/4 ounce of light rum, 1/2 ounce of fresh lime juice, and 1/4 ounce of Creme de Cassis to the glass.
    - Top it off with ginger beer and garnish with a lime wedge for the perfect Barracuda drink.
  fun_facts: |-
    1. Barracuda is a cocktail that originated in the Caribbean, specifically in the late 1960s in the Grand Cayman Island.

    2. The Barracuda is made with Rum, Pineapple Juice, Fresh Lime Juice and A touch Of Galliano.

    3. The drink was inspired by the sleek and long barracuda fish, which is also known for its power and aggression.

    4. The Barracuda cocktail is often served with a slice of lime and a maraschino cherry for garnish.

    5. The drink gained popularity in the United States during the 1970s and has since become a staple in tiki bar culture.
  alcohol_free_alternative: One alcohol-free alternative to Barracuda could be a mocktail
    made with pineapple juice, lime juice, and Club soda. This mocktail can be served
    over ice and garnished with fresh mint leaves for added refreshment. Another option
    could be a ginger beer-based mocktail made with ginger beer, lime juice, and honey
    syrup, which is perfect for those who enjoy a more spicy and flavorful drink.
    Lastly, a non-alcoholic tropical punch made with pineapple, orange juice, and
    cranberry juice can also provide a delightful and refreshing alternative to Barracuda.
  page_body: |-
    ## How to build a Barracuda

    1. Chill a Margarita glass first so the drink stays crisp and lively after the sparkling wine is added. A few minutes in the freezer works well.
    2. Fill a shaker with ice, then add the gold rum, Galliano, pineapple juice, and a small dash of fresh lime juice. The lime should brighten the fruit rather than turn the drink tart.
    3. Shake hard for about 10 to 12 seconds. You want the pineapple fully integrated and the drink well chilled without becoming too watery.
    4. Strain into the chilled glass, leaving enough room at the top for the sparkling finish. A fine strain can help keep the texture smoother.
    5. Top gently with Prosecco. Pour slowly to preserve the bubbles and avoid knocking out the aromatics.
    6. Serve immediately, ideally without garnish or with a very restrained lime twist if you want a citrus note on the nose. This drink is best when cold, bright, and effervescent.

    ## What the Barracuda tastes like

    The Barracuda sits between tropical cocktail and sparkling aperitif. Rum brings warmth and light molasses notes, Galliano adds vanilla and herbal sweetness, and pineapple gives the drink its lush body. The sparkling wine lifts everything, making it feel drier and more elegant than a typical fruit-forward rum drink. Expect a profile that is aromatic, lightly creamy in texture, fruity up front, and bubbly on the finish.

    ## Best way to serve it well

    Because it is served straight up, temperature matters. Use cold ingredients when possible, and add the Prosecco only at the end so the drink keeps its sparkle. A Margarita glass suits the broad aroma release and gives the drink a festive look, but any stemmed cocktail glass with room for foam and bubbles will do in a pinch. This is a strong choice for brunches, warm-weather parties, or as a playful pre-dinner cocktail.

    ## A little Barracuda background

    The Barracuda is recognized by the IBA among newer-era classics. Exact origin details are not especially well documented, but it is generally understood as a late-20th-century style drink that reflects the period’s love of tropical flavors paired with sparkling wine. Its mix of rum, pineapple, and anise-vanilla liqueur gives it a distinctive identity compared with more common rum sours or tiki-style serves.

    ## Easy spirit-free version

    For a non-alcoholic take, use a zero-proof golden rum alternative, a vanilla-anise herbal syrup in place of Galliano, pineapple juice, and a dash of fresh lime. Top with chilled alcohol-free sparkling wine or sparkling white grape juice. Keep the balance on the dry side so it still feels like a cocktail rather than a fruit punch.
