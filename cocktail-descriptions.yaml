  fun_facts: |-
    1. Brandy Crusta is a cocktail traditionally made with cognac, lemon juice, orange liqueur, maraschino liqueur, and bitters.
    2. The Brandy Crusta is believed to be one of the oldest classic cocktails, invented in New Orleans in the mid-1800s.
    3. The cocktail gets its name from the sugared rim that crusts on the edge of the glass.
    4. The Brandy Crusta's recipe was first published in 1862 in Jerry Thomas' book "How to Mix Drinks."
    5. The Brandy Crusta's unique glass presentation, with the sugar rim and a long spiral of lemon peel, has inspired many modern cocktails such as the Sidecar and the Margarita.
  alcohol_free_alternative: One alcohol-free alternative to the drink Brandy Crusta
    is a mocktail made with fresh lemon juice, orange juice, simple syrup, bitters,
    and a splash of grenadine. It can be served in a sugar-rimmed glass or with a
    slice of orange to mimic the flavors of Brandy Crusta. This non-alcoholic version
    is refreshing, tangy, and has a subtle sweetness that balances the tartness of
    the citrus juices. It can be enjoyed at any time without the buzz.
  page_body: "## How to build a proper Brandy Crusta\n\n1. **Prepare the glass first.**
    Chill a cocktail glass well. Lightly moisten the rim with lemon, then dip it in
    fine sugar so you get an even crust rather than a thick, clumpy edge.  \n2. **Set
    up the citrus garnish.** If you want the classic presentation, cut a long, neat
    strip of lemon peel and line the inside of the glass with it, letting it rise
    slightly above the rim. This is one of the drink’s signature details.  \n3. **Combine
    the drink.** In a mixing glass, add brandy, maraschino, curaçao, fresh lemon juice,
    simple syrup, and aromatic bitters.  \n4. **Add plenty of cold ice.** Stir until
    the mixture is thoroughly chilled and slightly diluted; the drink should taste
    polished and integrated, not sharp or hot.  \n5. **Strain carefully.** Fine-strain
    into the prepared glass to keep the texture clean and elegant.  \n6. **Serve immediately.**
    The sugar rim should frame the tart, aromatic drink rather than overpower it,
    so avoid over-rimming or using coarse sugar.\n\n## What the Brandy Crusta tastes
    like\n\nThe Brandy Crusta sits between an old-school sour and an early fancy cocktail.
    Brandy gives it warmth and round fruit, while lemon brings brightness. Maraschino
    and curaçao add a lightly perfumed, almost candied citrus-cherry note, and the
    bitters keep it from feeling overly sweet. The sugared rim changes each sip, giving
    you a shifting balance of tart, spirituous, and sweet.\n\n## Why the sugar rim
    matters\n\nThis is not just decoration. The “crusta” is the defining feature:
    a frosted rim that softens the drink’s acidity and highlights its citrus aromas.
    Serve it **very cold** and straight up, ideally in a smaller cocktail glass so
    it stays crisp from first sip to last. If your brandy is especially rich or oaky,
    stir a touch longer for extra dilution.\n\n## A likely origin story\n\nThe Brandy
    Crusta is one of the great mid-19th-century classics, most often linked to **Joseph
    Santini of New Orleans** in the 1850s. Exact documentation is a little hazy, as
    with many drinks of that era, but Santini is the name most commonly credited.
    It is also often discussed as a forerunner to the Sidecar, thanks to its structure
    of spirit, citrus, and orange liqueur.\n\n## A zero-proof crusta-style riff\n\nFor
    a non-alcoholic version, use a **good alcohol-free brandy alternative** or strong
    chilled black tea as the base, then add lemon juice, a little orange syrup, a
    spoon of cherry syrup, and a dash or two of non-alcoholic bitters. Stir with ice
    and strain into the same sugar-rimmed glass. You keep the bright, aromatic, old-fashioned
    feel even without the alcohol."
